<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mee Character Customizer</title>
  <!-- SEO Meta Tags -->
  <meta name="description" content="An interactive high-fidelity character customizer for Mee SVG characters. Choose gender, outfits, skin tones, facial features, and download your character.">
  <meta name="keywords" content="Mee Character, Character Customizer, SVG Avatar Generator, Avatar Creator">
  <meta name="author" content="Antigravity">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Custom Stylesheet -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="glow-bg"></div>
  
  <div class="app-container">
    <header class="app-header">
      <div class="logo-area">
        <i class="fa-solid fa-wand-magic-sparkles logo-icon"></i>
        <h1>Mee Character <span>Customizer</span></h1>
      </div>
      <p class="subtitle">Design, customize, and export your personal SVG character avatar</p>
    </header>
    
    <main class="main-content">
      <!-- Preview Panel -->
      <section class="preview-panel" id="preview-panel-container">
        <div class="preview-card glass-panel">
          <div class="card-header">
            <span class="status-indicator"><span class="dot"></span> Live Preview</span>
            <div class="header-actions">
              <button id="btn-randomize" class="icon-btn btn-secondary" title="Randomize Attributes">
                <i class="fa-solid fa-dice"></i>
              </button>
              <button id="btn-reset" class="icon-btn btn-secondary" title="Reset to Default">
                <i class="fa-solid fa-rotate-left"></i>
              </button>
            </div>
          </div>
          
          <div class="preview-viewport" id="svg-preview-container">
            <!-- Composed SVG will be injected here by app.js -->
            <div class="loader-spinner">
              <i class="fa-solid fa-spinner fa-spin"></i>
            </div>
          </div>
          
          <div class="export-actions">
            <button id="btn-export-svg" class="btn btn-primary">
              <i class="fa-solid fa-file-code"></i> Download SVG
            </button>
            <button id="btn-export-png" class="btn btn-gradient">
              <i class="fa-solid fa-file-image"></i> Download PNG
            </button>
          </div>
        </div>
      </section>
      
      <!-- Customizer / Options Panel -->
      <section class="options-panel">
        <div class="options-card glass-panel">
          <div class="tabs-navigation">
            <button class="tab-btn active" data-tab="identity">
              <i class="fa-solid fa-user-gear"></i> Body
            </button>
            <button class="tab-btn" data-tab="facial">
              <i class="fa-solid fa-face-smile"></i> Facial
            </button>
          </div>
          
          <div class="tab-content-container">
            <!-- Identity Tab (Gender, Clothes, Skin Tone, Face Shape) -->
            <div class="tab-content active" id="tab-identity">
              <!-- Gender selection -->
              <div class="option-group">
                <label class="group-title"><i class="fa-solid fa-venus-mars"></i> Gender</label>
                <div class="gender-toggle-wrapper">
                  <input type="radio" id="gender-male" name="gender" value="male" checked>
                  <label for="gender-male" class="gender-card">
                    <i class="fa-solid fa-mars"></i>
                    <span>Male</span>
                  </label>
                  
                  <input type="radio" id="gender-female" name="gender" value="female">
                  <label for="gender-female" class="gender-card">
                    <i class="fa-solid fa-venus"></i>
                    <span>Female</span>
                  </label>
                </div>
              </div>
              

              <!-- Skin Tone selection -->
              <div class="option-group">
                <label class="group-title"><i class="fa-solid fa-palette"></i> Skin Tone</label>
                <div class="skin-tone-grid" id="skin-tone-picker">
                  <!-- Generated by app.js -->
                </div>
                <!-- Custom Skin Colors Section -->
                <div class="custom-skin-section">
                  <div class="color-picker-item">
                    <span>Base Color</span>
                    <input type="color" id="custom-skin-base" value="#ffe7e6" title="Custom Skin Base Color">
                  </div>
                  <div class="color-picker-item">
                    <span>Shading Color</span>
                    <input type="color" id="custom-skin-shading" value="#ffcccc" title="Custom Skin Shading Color">
                  </div>
                </div>
              </div>
              

            </div>
            
            <!-- Facial Tab (Eyes, Eyebrows, Nose, Mouth, Ears) -->
            <div class="tab-content" id="tab-facial">

              <!-- Eyes selection -->
              <div class="option-group">
                <label class="group-title"><i class="fa-solid fa-eye"></i> Eyes</label>
                <div class="cards-grid" id="eyes-picker">
                  <!-- Generated by app.js -->
                </div>
              </div>
              
              <!-- Eyebrows selection -->
              <div class="option-group">
                <label class="group-title"><i class="fa-solid fa-lines-leaning"></i> Eyebrows</label>
                <div class="cards-grid" id="eyebrows-picker">
                  <!-- Generated by app.js -->
                </div>
              </div>
              
              <!-- Nose selection -->
              <div class="option-group">
                <label class="group-title"><i class="fa-solid fa-ellipsis-vertical"></i> Nose</label>
                <div class="cards-grid" id="nose-picker">
                  <!-- Generated by app.js -->
                </div>
              </div>
              
              <!-- Mouth selection -->
              <div class="option-group">
                <label class="group-title"><i class="fa-regular fa-face-smile-mouth"></i> Mouth</label>
                <div class="cards-grid" id="mouth-picker">
                  <!-- Generated by app.js -->
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>
  
  <!-- Dynamic Canvas for PNG exports -->
  <canvas id="export-canvas" style="display: none;"></canvas>
  
  <!-- Assets & App scripts with cache-busting version query parameters -->
  <script src="assets.js?v=13"></script>
  <script src="app.js?v=13"></script>
</body>
</html>
