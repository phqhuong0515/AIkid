  <script>
    // Dynamic Character Loading from customizer (Temporarily overridden with the red-hair girl)
    window.addEventListener('DOMContentLoaded', () => {
      const characterImg = document.getElementById('character-portrait-img');
      if (characterImg) {
        try {
          // Load fallback/temporary girl image and make its white background transparent dynamically
          const img = new Image();
          img.crossOrigin = 'Anonymous';
          img.onload = function () {
            const canvas = document.createElement('canvas');
            canvas.width = img.width;
            canvas.height = img.height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0);
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imgData.data;
            const width = canvas.width;
            const height = canvas.height;

            // Flood-fill starting from all boundary pixels to key out background white pixels
            const visited = new Uint8Array(width * height);
            const queue = [];

            // Add all boundary pixels to queue
            for (let x = 0; x < width; x++) {
              queue.push({ x: x, y: 0 });
              queue.push({ x: x, y: height - 1 });
              visited[x] = 1;
              visited[(height - 1) * width + x] = 1;
            }
            for (let y = 1; y < height - 1; y++) {
              queue.push({ x: 0, y: y });
              queue.push({ x: width - 1, y: y });
              visited[y * width] = 1;
              visited[y * width + width - 1] = 1;
            }

            while (queue.length > 0) {
              const { x, y } = queue.shift();
              const idx = (y * width + x) * 4;

              const r = data[idx];
              const g = data[idx + 1];
              const b = data[idx + 2];
              const a = data[idx + 3];

              // Detect background: either natively transparent, OR neutral white/grey checkerboard squares
              const isTransparent = (a === 0);
              const isNeutralBg = (r >= 150 && Math.abs(r - g) < 20 && Math.abs(g - b) < 20 && Math.abs(r - b) < 20);

              if (isTransparent || isNeutralBg) {
                data[idx + 3] = 0; // Make transparent

                // Add neighbors
                const neighbors = [
                  { x: x - 1, y: y },
                  { x: x + 1, y: y },
                  { x: x, y: y - 1 },
                  { x: x, y: y + 1 }
                ];
                for (const n of neighbors) {
                  if (n.x >= 0 && n.x < width && n.y >= 0 && n.y < height) {
                    const nIdx = n.y * width + n.x;
                    if (visited[nIdx] === 0) {
                      visited[nIdx] = 1;
                      queue.push(n);
                    }
                  }
                }
              }
            }

            ctx.putImageData(imgData, 0, 0);
            characterImg.src = canvas.toDataURL('image/png');
          };
          img.src = '/assets/images/character-feature-test.png';
        } catch (e) {
          console.error("Failed to load/process character image", e);
        }
      }

      // Custom Gender Dropdown Toggle Logic
      const selectContainer = document.getElementById('gender-select-container');
      const dropdownOptions = document.getElementById('gender-dropdown-options');
      const selectedValueSpan = document.getElementById('gender-selected-value');

      if (selectContainer && dropdownOptions && selectedValueSpan) {
        selectContainer.addEventListener('click', (e) => {
          e.stopPropagation();
          const isVisible = dropdownOptions.style.display === 'block';
          dropdownOptions.style.display = isVisible ? 'none' : 'block';
        });

        const options = dropdownOptions.querySelectorAll('.gender-option');
        options.forEach(option => {
          option.addEventListener('click', (e) => {
            e.stopPropagation();
            const val = option.getAttribute('data-value');
            selectedValueSpan.textContent = val;
            selectedValueSpan.style.color = '#BCA695';

            // Toggle selected class
            options.forEach(opt => opt.classList.remove('selected'));
            option.classList.add('selected');

            dropdownOptions.style.display = 'none';
          });
        });

        // Close dropdown when clicking outside
        document.addEventListener('click', () => {
          dropdownOptions.style.display = 'none';
        });
      }

      // Birthday Input Mask & Validation (dd/mm format with month-specific day limits)
      const birthdayInput = document.getElementById('birthday-input');
      if (birthdayInput) {
        birthdayInput.addEventListener('input', function (e) {
          let value = e.target.value;

          // Remove all non-digit characters
          let digits = value.replace(/\D/g, '');

          let dayStr = digits.substring(0, 2);
          let monthStr = digits.substring(2, 4);

          let monthVal = 0;
          if (monthStr) {
            monthVal = parseInt(monthStr, 10);
            if (monthVal > 12) {
              monthVal = 12;
              monthStr = '12';
            } else if (monthVal === 0 && monthStr.length === 2) {
              monthVal = 1;
              monthStr = '01';
            }
          }

          // Determine max days based on month
          let maxDays = 31;
          if (monthVal === 2) {
            maxDays = 29;
          } else if ([4, 6, 9, 11].includes(monthVal)) {
            maxDays = 30;
          }

          if (dayStr) {
            let dayVal = parseInt(dayStr, 10);
            if (dayVal > maxDays) {
              dayStr = String(maxDays);
            } else if (dayVal === 0 && dayStr.length === 2) {
              dayStr = '01';
            }
          }

          let formatted = '';
          if (dayStr) {
            formatted += dayStr;
            if (digits.length > 2 || value.includes('/')) {
              formatted += '/' + monthStr;
            }
          }

          e.target.value = formatted;
        });

        birthdayInput.addEventListener('blur', function (e) {
          let value = e.target.value;
          if (!value) {
            e.target.placeholder = 'dd/mm';
            return;
          }
          let parts = value.split('/');
          let day = parts[0] || '';
          let month = parts[1] || '';

          if (day && day.length < 2) {
            day = day.padStart(2, '0');
          }
          if (month && month.length < 2) {
            month = month.padStart(2, '0');
          }

          if (day && !month) {
            month = '01';
          }

          if (day && month) {
            let dVal = parseInt(day, 10);
            let mVal = parseInt(month, 10);
            if (mVal > 12) mVal = 12;

            let maxD = 31;
            if (mVal === 2) {
              maxD = 29;
            } else if ([4, 6, 9, 11].includes(mVal)) {
              maxD = 30;
            }

            if (dVal > maxD) {
              day = String(maxD).padStart(2, '0');
            }
            month = String(mVal).padStart(2, '0');

            e.target.value = day + '/' + month;
          } else {
            e.target.value = '';
            e.target.placeholder = 'dd/mm';
          }
        });
      }

      // Age Input restriction (digits only)
      const ageInput = document.getElementById('age-input');
      if (ageInput) {
        ageInput.addEventListener('input', function (e) {
          e.target.value = e.target.value.replace(/\D/g, '');
        });
      }

      // Voice Inline Logic (The Sims 4 CAS style)
      const voiceSelectedSpan = document.getElementById('voice-selected-value');
      const voiceTypeBtns = document.querySelectorAll('.voice-type-btn');
      const voicePitchRange = document.getElementById('voice-pitch-range');
      const btnPlayVoicePreview = document.getElementById('btn-play-voice-preview');

      let currentVoiceType = "Ngọt ngào";
      let currentPitch = 0;

      if (voiceSelectedSpan) {
        // Voice Type Buttons click
        voiceTypeBtns.forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            voiceTypeBtns.forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            currentVoiceType = btn.getAttribute('data-value');
            updateVoiceDisplay();
          });
        });

        // Pitch slider input
        if (voicePitchRange) {
          voicePitchRange.addEventListener('input', (e) => {
            currentPitch = parseInt(e.target.value, 10);
            updateVoiceDisplay();
          });
        }

        // Preview speech synthesis
        if (btnPlayVoicePreview) {
          btnPlayVoicePreview.addEventListener('click', (e) => {
            e.stopPropagation();
            let previewText = "Chào bạn! Đây là giọng nói của mình.";
            if (currentVoiceType === "Ngọt ngào") {
              previewText = "Chào bạn nha! Giọng mình nghe ngọt ngào đúng không?";
            } else if (currentVoiceType === "Trong trẻo") {
              previewText = "Xin chào! Bạn có thấy giọng mình trong trẻo không?";
            } else if (currentVoiceType === "Mạnh mẽ") {
              previewText = "Xin chào! Bạn có thấy giọng mình mạnh mẽ không?";
            }

            if ('speechSynthesis' in window) {
              window.speechSynthesis.cancel();
              const utterance = new SpeechSynthesisUtterance(previewText);
              const pitchVal = 1 + (currentPitch / 100);
              utterance.pitch = Math.max(0.5, Math.min(2.0, pitchVal));

              const voices = window.speechSynthesis.getVoices();
              const viVoice = voices.find(v => v.lang.startsWith('vi'));
              if (viVoice) {
                utterance.voice = viVoice;
              }
              utterance.rate = 1.05;
              window.speechSynthesis.speak(utterance);
            }
          });
        }

        function updateVoiceDisplay() {
          let toneLabel = "";
          if (currentPitch < -15) {
            toneLabel = `Trầm`;
          } else if (currentPitch > 15) {
            toneLabel = `Bổng`;
          } else {
            toneLabel = `Trung bình`;
          }
          voiceSelectedSpan.textContent = `${currentVoiceType} (${toneLabel})`;
        }
      }

      // Random Name Dice button logic
      const nameInput = document.getElementById('name-input');
      const btnRandomName = document.getElementById('btn-random-name');
      const randomNames = [
        "Gia Bảo", "Minh Triết", "Hữu Phước", "Tuấn Kiệt", "Bảo Lâm", "Khôi Nguyên", "Thanh Phong",
        "Hoàng Bách", "Đức Anh", "Nhật Minh", "Hải Đăng", "Quang Khải", "Phúc Lâm", "Khánh An",
        "Tú Linh", "Khánh Vy", "Ngọc Diệp", "Hương Giang", "Thảo Nguyên", "Mai Chi", "Quỳnh Anh",
        "Phương Trúc", "Minh Thư", "Như Quỳnh", "Hoài An", "Bảo Châu", "Trang Nhung", "Hà Linh",
        "Oliver", "Leo", "Charlie", "Arthur", "Noah", "Oscar", "George", "Henry", "Thomas", "Jack",
        "Olivia", "Amelia", "Isla", "Ava", "Ivy", "Freya", "Lily", "Florence", "Mia", "Zoe",
        "Lucas", "Liam", "Ethan", "Mason", "Alexander", "Emily", "Sophia", "Chloe", "Grace", "Harper",
        "Leo Minh", "Zoe Linh", "Max Nam", "Mia Vy", "Jack Phong", "Lily Mai", "Lucas Bách", "Ruby Vân"
      ];

      if (btnRandomName && nameInput) {
        btnRandomName.addEventListener('click', (e) => {
          e.stopPropagation();

          // Trigger spin animation
          btnRandomName.classList.add('dice-spin');
          setTimeout(() => {
            btnRandomName.classList.remove('dice-spin');
          }, 500);

          // Get random name (avoid getting the same name twice consecutively)
          let newName = "";
          do {
            const randomIndex = Math.floor(Math.random() * randomNames.length);
            newName = randomNames[randomIndex];
          } while (newName === nameInput.value && randomNames.length > 1);

          nameInput.value = newName;
          nameInput.dispatchEvent(new Event('input', { bubbles: true }));
        });
      }

      // Auto-save name and species to localStorage to sync with character creator prompt
      const speciesInput = document.getElementById('species-input');
      
      // Load existing values from localStorage if available
      if (nameInput) {
        const savedName = localStorage.getItem('storymee_char_name');
        if (savedName) nameInput.value = savedName;
        
        nameInput.addEventListener('input', () => {
          localStorage.setItem('storymee_char_name', nameInput.value.trim());
        });
      }
      if (speciesInput) {
        const savedSpecies = localStorage.getItem('storymee_char_species');
        if (savedSpecies) speciesInput.value = savedSpecies;
        
        speciesInput.addEventListener('input', () => {
          localStorage.setItem('storymee_char_species', speciesInput.value.trim());
        });
      }
    });

    function adjustScale() {
      const wrapper = document.querySelector('.scaler-wrapper');
      if (!wrapper) return;

      const targetWidth = 2080;
      const targetHeight = 930;
      const winWidth = window.innerWidth;
      const winHeight = window.innerHeight;

      const scale = Math.min(winWidth / targetWidth, winHeight / targetHeight);

      wrapper.style.transform = `translateX(-50%) scale(${scale})`;
    }

    window.addEventListener('resize', adjustScale);
    window.addEventListener('load', adjustScale);
    adjustScale();
  </script>
</body>

</html>
