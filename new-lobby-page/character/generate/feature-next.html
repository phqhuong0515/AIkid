  <script>
    function adjustScale() {
      const wrapper = document.querySelector('.scaler-wrapper');
      if (!wrapper) return;

      const targetWidth = 2080;
      const targetHeight = 1020;
      const winWidth = window.innerWidth;
      const winHeight = window.innerHeight;

      const scale = Math.min(winWidth / targetWidth, winHeight / targetHeight);

      wrapper.style.transform = `translateX(-50%) scale(${scale})`;
    }

    window.addEventListener('resize', adjustScale);
    window.addEventListener('load', adjustScale);
    adjustScale();

    // High-fidelity synthesized Bubble SFX for transitions
    function playPopSound() {
      try {
        var ctx = new (window.AudioContext || window.webkitAudioContext)();
        var osc1 = ctx.createOscillator();
        var gain1 = ctx.createGain();
        var osc2 = ctx.createOscillator();
        var gain2 = ctx.createGain();

        osc1.connect(gain1);
        gain1.connect(ctx.destination);
        osc2.connect(gain2);
        gain2.connect(ctx.destination);

        var now = ctx.currentTime;

        osc1.type = 'triangle';
        osc1.frequency.setValueAtTime(200, now);
        osc1.frequency.exponentialRampToValueAtTime(1400, now + 0.15);

        gain1.gain.setValueAtTime(0, now);
        gain1.gain.linearRampToValueAtTime(0.25, now + 0.015);
        gain1.gain.exponentialRampToValueAtTime(0.01, now + 0.15);

        osc2.type = 'sine';
        osc2.frequency.setValueAtTime(850, now);
        osc2.frequency.exponentialRampToValueAtTime(1600, now + 0.02);
        osc2.frequency.exponentialRampToValueAtTime(450, now + 0.08);

        gain2.gain.setValueAtTime(0, now);
        gain2.gain.linearRampToValueAtTime(0.18, now + 0.005);
        gain2.gain.exponentialRampToValueAtTime(0.01, now + 0.08);

        osc1.start(now);
        osc1.stop(now + 0.16);
        osc2.start(now);
        osc2.stop(now + 0.09);
      } catch (e) {
        console.error("Audio Context error:", e);
      }
    }

    function playPopAndNavigate(url) {
      playPopAndNavigateInternal(url);
    }

    function playPopAndNavigateInternal(url) {
      playPopSound();
      const loader = document.getElementById('page-loader-overlay');
      if (loader) {
        loader.style.display = 'flex';
        loader.offsetHeight; // Force reflow
        loader.style.opacity = '1';
      }
      setTimeout(function () {
        window.location.href = url;
      }, 350);
    }

    function hidePageLoader() {
      const loader = document.getElementById('page-loader-overlay');
      if (loader && loader.style.display !== 'none') {
        loader.style.opacity = '0';
        const content = document.querySelector('.scaler-wrapper');
        if (content) {
          content.style.opacity = '1';
        }
        setTimeout(() => {
          loader.style.display = 'none';
        }, 400);
      }
    }
    window.addEventListener('load', hidePageLoader);
    window.addEventListener('pageshow', (e) => {
      if (e.persisted) hidePageLoader();
    });
    setTimeout(hidePageLoader, 1500); // Safety fallback timeout

    // Profile Generation Logic
    window.addEventListener('DOMContentLoaded', async () => {
      const name = localStorage.getItem('storymee_char_name') || 'Gia Bảo';
      const age = localStorage.getItem('storymee_char_age') || '8';
      const gender = localStorage.getItem('storymee_char_gender') || 'Nam';
      const species = localStorage.getItem('storymee_char_species') || 'Thỏ';
      const description = localStorage.getItem('storymee_char_description') || 'Một chú thỏ nhỏ đáng yêu tinh nghịch thích ăn cà rốt.';
      const catchphrase = localStorage.getItem('storymee_char_catchphrase') || 'Cà rốt muôn năm!';
      const parentImage = localStorage.getItem('storymee_generated_character_img') || '';

      const imgEl = document.getElementById('generated-profile-img');
      const overlayEl = document.getElementById('generating-overlay');
      const saveBtn = document.getElementById('btn-save-character');

      // Check if we already have a cached profile sheet matching the current character metadata
      const currentMeta = name + "_" + age + "_" + gender + "_" + species + "_" + description.substring(0, 50) + "_" + catchphrase;
      const cachedProfileSheet = localStorage.getItem('storymee_generated_profile_sheet');
      const cachedMeta = localStorage.getItem('storymee_profile_sheet_meta');

      if (cachedProfileSheet && cachedMeta === currentMeta) {
        // Render from cache directly
        if (imgEl) {
          imgEl.src = cachedProfileSheet;
          imgEl.style.display = 'block';
        }
        if (overlayEl) {
          overlayEl.style.display = 'none';
        }
        if (saveBtn) {
          saveBtn.style.opacity = '1';
          saveBtn.style.pointerEvents = 'auto';
        }
        return; // Exit and do not generate again
      }

      const promptTemplate = `Create one horizontal 16:9 character profile sheet for a single stylized 3D chibi character.

First, analyze the character’s visual design and identify exactly 4 main colors only:
- 1 primary dominant color
- 1 secondary supporting color
- 1 light neutral color
- 1 dark accent color

These 4 colors must be the only core palette used for the entire template design. The full visual identity of the template must be derived from these 4 colors only.

Apply the 4-color palette consistently across the template:
- Use the primary and secondary colors for the main border, section borders, dividers, headings, icons, decorative symbols, and character name.
- Use the light neutral color for the background and light panel fills.
- Use the dark accent color for text, outlines, borders, and important details.
- Keep strong contrast between the character, text, borders, and background.
- Avoid unrelated colors that do not appear in the character design.
- The final template must feel custom-designed specifically for this character.

LAYOUT AND COMPOSITION

Create one clean, polished, cute, easy-to-read horizontal 16:9 character profile sheet with balanced spacing, rounded panels, thin borders, soft inner shadows, and a clear visual hierarchy.

Divide the sheet into two main columns.

LEFT COLUMN — approximately 45% of the canvas:
- Place one large half-body character portrait occupying most of the left side.
- Keep this portrait clearly larger and more dominant than every other character image.
- Fix the character name in a consistent position at the top center-left area, above the information cards and beside the large portrait.
- Place four compact rounded information cards beside or below the large portrait:
  1. THÔNG TIN CƠ BẢN
  2. MÔ TẢ NHÂN VẬT
  3. CÂU NÓI CỬA MIỆNG
  4. TÍNH CÁCH
- Add one horizontal 4-color palette at the bottom-left using exactly the 4 main character colors.
- Keep the portrait dominant and the text area neat, aligned, and easy to read.

RIGHT COLUMN — approximately 55% of the canvas:
Arrange three stacked rounded panels.

TOP PANEL:
- Show exactly 4 full-body turnaround views arranged evenly in one row.
- The 4 views must be:
  1. Front view
  2. Three-quarter front view
  3. Side view
  4. Back view
- Every view must have identical character proportions, outfit, hairstyle, accessories, materials, scale, and lighting.
- Keep all full-body views completely visible and aligned to the same floor line.
- Do not place any text labels under or above each turnaround image.

MIDDLE PANEL:
- Show exactly 5 head-and-shoulder facial expressions arranged evenly in one row.
- The 5 expressions must be generated based on the character’s personality.
- Choose expressions that best reflect the character’s traits.
- Keep the same camera angle, crop, head size, lighting, hairstyle, and outfit for every expression.
- Do not place any text labels under or above each expression.

BOTTOM PANEL:
- Show exactly 5 full-body action poses arranged evenly in one row.
- The 5 action poses must be generated based on the character’s personality and hobbies or interests.
- Choose actions that feel natural and specific to the character.
- Keep every pose fully visible, consistently scaled, and visually separated.
- Do not place any text labels under or above each action pose.

Use thin rounded borders, soft inner shadows, generous spacing, balanced margins, and a clear visual hierarchy. Keep the design clean, polished, cute, calm, and easy to read. Decorative icons such as stars, sparkles, paw prints, flowers, leaves, small character-related symbols, or simple doodles may be placed near the borders, but they must match the 4-color palette and must never overlap the character or text.

VISUAL STYLE

High-quality stylized 3D chibi character render.
Large head, small body, soft rounded anatomy, expressive glossy eyes, smooth facial features, subtle skin texture, soft blush, detailed layered hair, realistic fabric texture, clean stylized materials, and gentle studio lighting.

TYPOGRAPHY

Use a rounded, friendly, highly legible Vietnamese font.

The character name should use a large playful bubble-style display font based on the character’s dominant palette, with:
- a soft gradient

- subtle depth or shadow

The name position must remain fixed at the top center-left area of the layout.

Section headings should be:

- bold
- centered
- based on the character’s dark accent color

Body text should be:
- short
- dark navy, deep brown, dark gray, or the dark accent color
- evenly spaced
- clearly readable
- correctly written in Vietnamese

Do not distort letters.
Do not miss Vietnamese diacritics.
Do not generate random, broken, or unreadable text.
Keep every text section concise to reduce spelling errors.

      try {
        const response = await fetch('/api/generate-image', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            prompt: promptTemplate,
            existingImage: parentImage,
            aspectRatio: '16:9',
            isProfileSheet: true
          })
        });

        const data = await response.json();
        if (data.error) {
          throw new Error(data.error);
        }

        const imgEl = document.getElementById('generated-profile-img');
        const overlayEl = document.getElementById('generating-overlay');
        const saveBtn = document.getElementById('btn-save-character');
        if (imgEl && data.url) {
          imgEl.src = data.url;
          imgEl.style.display = 'block';
          // Cache the generated sheet and its metadata matching the character config
          try {
            localStorage.setItem('storymee_generated_profile_sheet', data.url);
            localStorage.setItem('storymee_profile_sheet_meta', currentMeta);
          } catch (e) {
            console.warn("Storage quota exceeded, could not cache locally:", e);
          }
        }
        if (overlayEl) {
          overlayEl.style.display = 'none';
        }
        if (saveBtn) {
          saveBtn.style.opacity = '1';
          saveBtn.style.pointerEvents = 'auto';
        }
      } catch (err) {
        console.error("Failed to generate character profile sheet:", err);
        const overlayEl = document.getElementById('generating-overlay');
        if (overlayEl) {
          overlayEl.innerHTML = `
            <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; background: #FFF5F5; border: 3px solid #FEB2B2; border-radius: 24px; padding: 24px; text-align: center; box-sizing: border-box; max-width: 500px;">
              <i class="fa-solid fa-triangle-exclamation" style="font-size: 2.5rem; color: #E53E3E;"></i>
              <div style="font-family: 'Mali', sans-serif; font-weight: 700; color: #C53030; font-size: 1.2rem;">Lỗi tạo Hồ sơ Nhân vật</div>
              <div style="font-size: 0.95rem; color: #9B2C2C; word-break: break-word;">${err.message || 'Vui lòng kiểm tra kết nối mạng hoặc API key'}</div>
              <button onclick="window.location.reload()" style="margin-top: 12px; font-family: 'Mali', sans-serif; background: #FF7597; border: none; border-radius: 9999px; color: #FFFFFF; font-weight: 700; font-size: 1rem; padding: 10px 24px; cursor: pointer; box-shadow: 0 4px 10px rgba(255, 117, 151, 0.3);">Thử lại</button>
            </div>
          `;
        }
      }
    });

    function saveCharacter() {
      playPopSound();
      const imgEl = document.getElementById('generated-profile-img');
      if (imgEl && imgEl.src && !imgEl.src.startsWith('data:image/gif')) {
        // Save to localStorage
        localStorage.setItem('storymee_saved_profile_sheet', imgEl.src);
        
        // Trigger download
        const link = document.createElement('a');
        link.href = imgEl.src;
        const charName = localStorage.getItem('storymee_char_name') || 'nhan_vat';
        link.download = `Ho_So_Nhan_Vat_${charName.replace(/\s+/g, '_')}.png`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);

        alert("🎉 Chúc mừng! Hồ sơ nhân vật của em đã được lưu và tải xuống thành công!");
      }
    }
