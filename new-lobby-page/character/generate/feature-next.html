<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tiếp Tục Hành Trình - AIkid</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Bowlby+One&family=Fredoka:wght@300..700&family=Mali:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;1,200;1,300;1,400;1,500;1,600;1,700&family=Outfit:wght@300..800&display=swap"
    rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Chiron+GoRound+TC:wght@900&display=swap" rel="stylesheet">
  
  <!-- Base styling -->
  <style>
    * {
      box-sizing: border-box;
    }

    body,
    html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #fad698 !important;
    }

    .scaler-wrapper {
      background: transparent !important;
      opacity: 0;
      transition: opacity 0.4s ease;
      box-sizing: border-box;
      position: absolute;
      top: 0;
      left: 50%;
      width: 2080px;
      height: 930px;
      transform-origin: top center;
      transform: translateX(-50%) scale(1);
      pointer-events: none;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .scaler-wrapper > * {
      pointer-events: auto;
    }

    /* Common navigation button styles */
    .nav-btn {
      position: absolute;
      top: calc(50% + 121px);
      transform: translateY(-50%) scale(1.17);
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #FF5C8A, #FF8E53);
      border: 3.5px solid #FCF4DB;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #FFFFFF;
      box-shadow: 0 10px 25px rgba(255, 92, 138, 0.4);
      cursor: pointer;
      z-index: 99999;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      text-decoration: none;
    }

    .nav-btn svg {
      width: 24px;
      height: 24px;
      fill: currentColor;
      transition: transform 0.2s ease;
    }

    /* Left button specific */
    .btn-left {
      left: 104px;
    }

    .btn-left svg {
      margin-right: 2px;
    }

    .btn-left:hover {
      transform: translateY(-50%) scale(1.33);
      box-shadow: 0 15px 35px rgba(255, 92, 138, 0.6);
      background: linear-gradient(135deg, #FF7096, #FFA072);
    }

    .btn-left:hover svg {
      transform: translateX(-2px);
    }

    .btn-left:active {
      transform: translateY(-50%) scale(1.11);
    }

    /* Right button specific */
    .btn-right {
      right: 104px;
    }

    .btn-right svg {
      margin-left: 2px;
    }

    .btn-right:hover {
      transform: translateY(-50%) scale(1.33);
      box-shadow: 0 15px 35px rgba(255, 92, 138, 0.6);
      background: linear-gradient(135deg, #FF7096, #FFA072);
    }

    .btn-right:hover svg {
      transform: translateX(2px);
    }

    .btn-right:active {
      transform: translateY(-50%) scale(1.11);
    }

    /* Header logo styling fallback */
    .logo-image {
      height: 58px;
    }

    /* Main Container Styles */
    .app-container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .main-content {
      flex: 1;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .workspace-panel {
      background: rgba(253, 250, 244, 0.95);
      width: 850px;
      height: 580px;
      border-radius: 36px;
      padding: 40px;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      border: 4px solid #FCF4DB;
    }
  </style>

  <!-- Load external stylesheet -->
  <link rel="stylesheet" href="/mee/styles.css?v=202607141142">

  <!-- Override external stylesheet styles to align with feature.html layout -->
  <style>
    body,
    html {
      background-image: url('/assets/images/bg-character-feature.png?v=7') !important;
      background-repeat: no-repeat !important;
      background-position: center center !important;
      background-size: cover !important;
      background-attachment: fixed !important;
    }

    .scaler-wrapper {
      width: 2080px !important;
    }

    .universe-header {
      width: calc(100% - 76px) !important;
    }

    .app-container {
      margin-top: 140px !important;
      transform: none !important;
      width: 100% !important;
      max-width: 100% !important;
      height: calc(100% - 140px) !important;
      position: relative;
    }
  </style>
</head>

<body>
  <!-- Global Meteor Loading Overlay -->
  <div id="page-loader-overlay" style="
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: linear-gradient(135deg, #FF6B6B 0%, #FF8E53 55%, #FCE082 100%);
    /* Starry background effect for sunset */
    background-image: 
      radial-gradient(rgba(255,255,255,0.4), rgba(255,255,255,0.1) 2px, transparent 40px),
      radial-gradient(rgba(255,255,255,0.3), rgba(255,255,255,0.05) 1px, transparent 30px),
      linear-gradient(135deg, #FF6B6B 0%, #FF8E53 55%, #FCE082 100%);
    background-size: 550px 550px, 350px 350px, 100% 100%;
    background-position: 0 0, 40px 60px, 0 0;
    z-index: 999999;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 1;
    transition: opacity 0.4s ease;
    pointer-events: all;
    overflow: hidden;
  ">
    <style>
      @keyframes meteorFlight {
        0% {
          transform: translate(60vw, -60vh) rotate(150deg);
          opacity: 0;
        }
        10% {
          opacity: 1;
        }
        90% {
          opacity: 1;
        }
        100% {
          transform: translate(-60vw, 60vh) rotate(150deg);
          opacity: 0;
        }
      }
      @keyframes miniFlight {
        0% {
          transform: translate(60vw, -60vh) rotate(150deg);
          opacity: 0;
        }
        15% { opacity: 0.6; }
        85% { opacity: 0.6; }
        100% {
          transform: translate(-60vw, 60vh) rotate(150deg);
          opacity: 0;
        }
      }
      @keyframes loadingDots {
        0%, 20% { content: "."; }
        40% { content: ".."; }
        60%, 100% { content: "..."; }
      }
      .loading-dots::after {
        content: "";
        animation: loadingDots 1.5s infinite steps(1);
        display: inline-block;
        width: 24px;
        text-align: left;
      }
      .meteor-container {
        position: relative;
        width: 320px;
        height: 120px;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        animation: meteorFlight 2.2s cubic-bezier(0.25, 0.8, 0.25, 1) infinite;
        z-index: 10;
      }
      .meteor-head {
        width: 80px;
        height: 80px;
        background: radial-gradient(circle at 35% 35%, #FFF0F5 0%, #FFB6C1 25%, #FF5E97 60%, #9D1C7F 100%);
        border-radius: 50%;
        box-shadow: 
          0 0 25px rgba(255, 94, 151, 0.9),
          0 0 60px rgba(157, 28, 127, 0.6),
          0 0 120px rgba(157, 28, 127, 0.4);
        position: relative;
        flex-shrink: 0;
      }
      .meteor-crater {
        position: absolute;
        background: rgba(0, 0, 0, 0.08);
        border-radius: 50%;
        box-shadow: inset 1px 1px 2px rgba(0,0,0,0.15);
      }
      .meteor-crater-1 { width: 14px; height: 14px; top: 22px; left: 18px; }
      .meteor-crater-2 { width: 20px; height: 20px; top: 32px; left: 32px; }
      .meteor-crater-3 { width: 12px; height: 12px; top: 18px; left: 45px; }
      .meteor-crater-4 { width: 10px; height: 10px; top: 48px; left: 20px; }
      
      .meteor-trail {
        width: 600px;
        height: 70px;
        background: linear-gradient(to right, rgba(157, 28, 127, 0) 0%, rgba(157, 28, 127, 0.25) 35%, rgba(255, 94, 151, 0.75) 75%, rgba(255, 240, 245, 0.95) 100%);
        border-radius: 40px 0 0 40px;
        margin-right: -40px;
        filter: blur(2px);
      }
      .mini-meteor {
        position: absolute;
        width: 160px;
        height: 5px;
        background: linear-gradient(to right, rgba(255, 182, 193, 0) 0%, rgba(255, 255, 255, 0.9) 100%);
        border-radius: 9999px;
        opacity: 0;
        filter: blur(1.5px);
        transform: rotate(150deg);
      }
      .mini-1 {
        top: 15%;
        left: 10%;
        animation: miniFlight 1.6s linear infinite;
        animation-delay: 0.4s;
      }
      .mini-2 {
        top: 75%;
        left: 5%;
        animation: miniFlight 1.9s linear infinite;
        animation-delay: 0.9s;
      }
      .mini-3 {
        top: 85%;
        left: 50%;
        animation: miniFlight 1.4s linear infinite;
        animation-delay: 0.1s;
      }
    </style>

    <!-- Space Background Mini Meteors -->
    <div class="mini-meteor mini-1"></div>
    <div class="mini-meteor mini-2"></div>
    <div class="mini-meteor mini-3"></div>

    <!-- Main Meteor Container -->
    <div class="meteor-container">
      <div class="meteor-trail"></div>
      <div class="meteor-head">
        <div class="meteor-crater meteor-crater-1"></div>
        <div class="meteor-crater meteor-crater-2"></div>
        <div class="meteor-crater meteor-crater-3"></div>
        <div class="meteor-crater meteor-crater-4"></div>
      </div>
    </div>

    <!-- Glowing Loading Text -->
    <div style="margin-top: 50px; text-align: center; z-index: 20;">
      <h2 style="
        font-size: 2.2rem;
        font-weight: 900;
        color: #FFFFFF;
        font-family: 'Chiron GoRound TC', sans-serif;
        margin: 0;
        letter-spacing: 1px;
        text-shadow: 0 0 15px rgba(255, 94, 151, 0.9), 0 0 5px rgba(157, 28, 127, 0.5);
      ">Bé <span class="custom-đ">d</span>ợi chút nhé<span class="loading-dots"></span></h2>
    </div>
  </div>

  <div class="scaler-wrapper">
    <!-- Top Navigation Header from StoryMee Universe -->
    <header class="universe-header">
      <div class="universe-header-left">
        <div class="universe-logo" onclick="playPopAndNavigate('/')">
          <img src="/mee/logo.svg" alt="StoryMee Logo" class="logo-image">
        </div>
      </div>
      <div class="universe-header-right">
        <button class="universe-signup-btn" onclick="playPopAndNavigate('/login')">Đăng Nhập</button>
      </div>
    </header>

    <div class="app-container" style="position: relative;">
      <!-- Main Content Box Removed -->
    </div>


  </div>

  <script>
    function adjustScale() {
      const wrapper = document.querySelector('.scaler-wrapper');
      if (!wrapper) return;

      const targetWidth = 2080;
      const targetHeight = 930;
      const winWidth = window.innerWidth;
      const winHeight = window.innerHeight;

      const scale = Math.min(winWidth / targetWidth, winHeight / targetHeight);

      wrapper.style.transform = `translateX(-50%) scale(${scale})`;
    }

    window.addEventListener('resize', adjustScale);
    window.addEventListener('load', adjustScale);
    adjustScale();

    // High-fidelity synthesized Bubble SFX for transitions
    function playPopSound() {
      try {
        var ctx = new (window.AudioContext || window.webkitAudioContext)();
        var osc1 = ctx.createOscillator();
        var gain1 = ctx.createGain();
        var osc2 = ctx.createOscillator();
        var gain2 = ctx.createGain();

        osc1.connect(gain1);
        gain1.connect(ctx.destination);
        osc2.connect(gain2);
        gain2.connect(ctx.destination);

        var now = ctx.currentTime;

        osc1.type = 'triangle';
        osc1.frequency.setValueAtTime(200, now);
        osc1.frequency.exponentialRampToValueAtTime(1400, now + 0.15);

        gain1.gain.setValueAtTime(0, now);
        gain1.gain.linearRampToValueAtTime(0.25, now + 0.015);
        gain1.gain.exponentialRampToValueAtTime(0.01, now + 0.15);

        osc2.type = 'sine';
        osc2.frequency.setValueAtTime(850, now);
        osc2.frequency.exponentialRampToValueAtTime(1600, now + 0.02);
        osc2.frequency.exponentialRampToValueAtTime(450, now + 0.08);

        gain2.gain.setValueAtTime(0, now);
        gain2.gain.linearRampToValueAtTime(0.18, now + 0.005);
        gain2.gain.exponentialRampToValueAtTime(0.01, now + 0.08);

        osc1.start(now);
        osc1.stop(now + 0.16);
        osc2.start(now);
        osc2.stop(now + 0.09);
      } catch (e) {
        console.error("Audio Context error:", e);
      }
    }

    function playPopAndNavigate(url) {
      playPopAndNavigateInternal(url);
    }

    function playPopAndNavigateInternal(url) {
      playPopSound();
      const loader = document.getElementById('page-loader-overlay');
      if (loader) {
        loader.style.display = 'flex';
        loader.offsetHeight; // Force reflow
        loader.style.opacity = '1';
      }
      setTimeout(function () {
        window.location.href = url;
      }, 350);
    }

    function hidePageLoader() {
      const loader = document.getElementById('page-loader-overlay');
      if (loader && loader.style.display !== 'none') {
        loader.style.opacity = '0';
        const content = document.querySelector('.scaler-wrapper');
        if (content) {
          content.style.opacity = '1';
        }
        setTimeout(() => {
          loader.style.display = 'none';
        }, 400);
      }
    }
    window.addEventListener('load', hidePageLoader);
    window.addEventListener('pageshow', (e) => {
      if (e.persisted) hidePageLoader();
    });
    setTimeout(hidePageLoader, 1500); // Safety fallback timeout
  </script>
</body>

</html>
