    .nav-btn {
      position: absolute;
      top: calc(50% + 121px);
      transform: translateY(-50%) scale(1.17);

      height: 56px;

      z-index: 99999;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      text-decoration: none;
    }

    .nav-btn svg {
      width: 24px;
      height: 24px;
      fill: currentColor;
      transition: transform 0.2s ease;
    }

    .btn-left {
      left: 104px;
    }

    .btn-left svg {
      margin-right: 2px;
    }

    .btn-left:hover {
      transform: translateY(-50%) scale(1.35);
      box-shadow: 0 15px 35px rgba(255, 92, 138, 0.6);
      background: linear-gradient(135deg, #FF7096, #FFA072);

    .btn-left:active {
      transform: translateY(-50%) scale(1.11);

    .btn-right {
      right: 104px;
    }

      margin-left: 2px;

      transform: translateX(2px);

    .btn-right:active {
      transform: translateY(-50%) scale(1.11);

      transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);

<body>
  <!-- Global Meteor Loading Overlay -->
  <div id="page-loader-overlay" style="
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: linear-gradient(135deg, #FF6B6B 0%, #FF8E53 55%, #FCE082 100%);
    /* Starry background effect for sunset */
    background-image: 
      radial-gradient(rgba(255,255,255,0.4), rgba(255,255,255,0.1) 2px, transparent 40px),
      radial-gradient(rgba(255,255,255,0.3), rgba(255,255,255,0.05) 1px, transparent 30px),
      linear-gradient(135deg, #FF6B6B 0%, #FF8E53 55%, #FCE082 100%);
    background-size: 550px 550px, 350px 350px, 100% 100%;
    background-position: 0 0, 40px 60px, 0 0;
    z-index: 999999;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 1;
    transition: opacity 0.4s ease;
    pointer-events: all;
    overflow: hidden;
  ">
    <style>
      @keyframes meteorFlight {
        0% {
          transform: translate(60vw, -60vh) rotate(150deg);
          opacity: 0;
        }
        10% {
          opacity: 1;
        }
        90% {
          opacity: 1;
        }
        100% {
          transform: translate(-60vw, 60vh) rotate(150deg);
          opacity: 0;
        }
      }
      @keyframes miniFlight {
        0% {
          transform: translate(60vw, -60vh) rotate(150deg);
          opacity: 0;
        }
        15% { opacity: 0.6; }
        85% { opacity: 0.6; }
        100% {
          transform: translate(-60vw, 60vh) rotate(150deg);
          opacity: 0;
        }
      }
      @keyframes loadingDots {
        0%, 20% { content: "."; }
        40% { content: ".."; }
        60%, 100% { content: "..."; }
      }
      .loading-dots::after {
        content: "";
        animation: loadingDots 1.5s infinite steps(1);
        display: inline-block;
        width: 24px;
        text-align: left;
      }
      .meteor-container {
        position: relative;
        width: 320px;
        height: 120px;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        animation: meteorFlight 2.2s cubic-bezier(0.25, 0.8, 0.25, 1) infinite;
        z-index: 10;
      }
      .meteor-head {
        width: 80px;
        height: 80px;
        background: radial-gradient(circle at 35% 35%, #FFF0F5 0%, #FFB6C1 25%, #FF5E97 60%, #9D1C7F 100%);
        border-radius: 50%;
        box-shadow: 
          0 0 25px rgba(255, 94, 151, 0.9),
          0 0 60px rgba(157, 28, 127, 0.6),
          0 0 120px rgba(157, 28, 127, 0.4);
        position: relative;
        flex-shrink: 0;
      }
      .meteor-crater {
        position: absolute;
        background: rgba(0, 0, 0, 0.08);
        border-radius: 50%;
        box-shadow: inset 1px 1px 2px rgba(0,0,0,0.15);
      }
      .meteor-crater-1 { width: 14px; height: 14px; top: 22px; left: 18px; }
      .meteor-crater-2 { width: 20px; height: 20px; top: 32px; left: 32px; }
      .meteor-crater-3 { width: 12px; height: 12px; top: 18px; left: 45px; }
      .meteor-crater-4 { width: 10px; height: 10px; top: 48px; left: 20px; }
      
      .meteor-trail {
        width: 600px;
        height: 70px;
        background: linear-gradient(to right, rgba(157, 28, 127, 0) 0%, rgba(157, 28, 127, 0.25) 35%, rgba(255, 94, 151, 0.75) 75%, rgba(255, 240, 245, 0.95) 100%);
        border-radius: 40px 0 0 40px;
        margin-right: -40px;
        filter: blur(2px);
      }
      .mini-meteor {
        position: absolute;
        width: 160px;
        height: 5px;
        background: linear-gradient(to right, rgba(255, 182, 193, 0) 0%, rgba(255, 255, 255, 0.9) 100%);
        border-radius: 9999px;
        opacity: 0;
        filter: blur(1.5px);
        transform: rotate(150deg);
      }
      .mini-1 {
        top: 15%;
        left: 10%;
        animation: miniFlight 1.6s linear infinite;
        animation-delay: 0.4s;
      }
      .mini-2 {
        top: 75%;
        left: 5%;
        animation: miniFlight 1.9s linear infinite;
        animation-delay: 0.9s;
      }
      .mini-3 {
        top: 85%;
        left: 50%;
        animation: miniFlight 1.4s linear infinite;
        animation-delay: 0.1s;
      }
    </style>

    <!-- Space Background Mini Meteors -->
    <div class="mini-meteor mini-1"></div>
    <div class="mini-meteor mini-2"></div>
    <div class="mini-meteor mini-3"></div>

    <!-- Main Meteor Container -->
    <div class="meteor-container">
      <div class="meteor-trail"></div>
      <div class="meteor-head">
        <div class="meteor-crater meteor-crater-1"></div>
        <div class="meteor-crater meteor-crater-2"></div>
        <div class="meteor-crater meteor-crater-3"></div>
        <div class="meteor-crater meteor-crater-4"></div>
      </div>
    </div>

    <!-- Glowing Loading Text -->

      ">Bé <span class="custom-đ">d</span>ợi chút nhé<span class="loading-dots"></span></h2>
    </div>

                  <div style="

                      style="font-size: 1.15rem; font-weight: 700; color: #A0AEC0; font-family: 'Mali', sans-serif; user-select: none; margin-right: 3px; white-space: nowrap; flex-shrink: 0;">Loài:</span>
                    <input type="text" id="species-input" value="" placeholder="Nhập loài..." style="

                  <textarea placeholder="Nhập giới thiệu, bối cảnh của nhân vật..." style="

                <!-- Câu nói cửa miệng Field -->
                <div style="

                  ">
                  <span
                    style="font-size: 1.15rem; font-weight: 700; color: #A0AEC0; font-family: 'Mali', sans-serif; user-select: none;">Câu nói cửa miệng</span>
                  <input type="text" value="" placeholder="Nhập câu nói cửa miệng..." style="

    <!-- Left back button pointing to customizer -->
    <a href="/character-generate" class="nav-btn btn-left" title="Quay lại Tạo Nhân Vật" onclick="playPopAndNavigate('/character-generate'); return false;">
      <svg viewBox="0 0 24 24">

    <!-- Right next button pointing to feature-next -->
    <a href="/character-generate/feature-next" class="nav-btn btn-right" title="Tiếp tục" onclick="playPopAndNavigate('/character-generate/feature-next'); return false;">
      <svg viewBox="0 0 24 24">
        <path d="M8 5v14l11-7z" />
      </svg>
    </a>
  </div>

  <script>
    // No character image rendering on this page anymore
    window.addEventListener('DOMContentLoaded', () => {
      const characterImg = null;
      if (characterImg) {
        try {
          // Load fallback/temporary girl image and make its white background transparent dynamically
          const img = new Image();
          img.crossOrigin = 'Anonymous';
          img.onload = function () {
            const canvas = document.createElement('canvas');
            canvas.width = img.width;
            canvas.height = img.height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0);
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imgData.data;
            const width = canvas.width;
            const height = canvas.height;

            // Flood-fill starting from all boundary pixels to key out background white pixels
            const visited = new Uint8Array(width * height);
            const queue = [];

            // Add all boundary pixels to queue
            for (let x = 0; x < width; x++) {
              queue.push({ x: x, y: 0 });
              queue.push({ x: x, y: height - 1 });
              visited[x] = 1;
              visited[(height - 1) * width + x] = 1;
            }
            for (let y = 1; y < height - 1; y++) {
              queue.push({ x: 0, y: y });
              queue.push({ x: width - 1, y: y });
              visited[y * width] = 1;
              visited[y * width + width - 1] = 1;
            }

            while (queue.length > 0) {
              const { x, y } = queue.shift();
              const idx = (y * width + x) * 4;

              const r = data[idx];
              const g = data[idx + 1];
              const b = data[idx + 2];
              const a = data[idx + 3];

              // Detect background: either natively transparent, OR neutral white/grey checkerboard squares
              const isTransparent = (a === 0);
              const isNeutralBg = (r >= 150 && Math.abs(r - g) < 20 && Math.abs(g - b) < 20 && Math.abs(r - b) < 20);

              if (isTransparent || isNeutralBg) {
                data[idx + 3] = 0; // Make transparent

                // Add neighbors
                const neighbors = [
                  { x: x - 1, y: y },
                  { x: x + 1, y: y },
                  { x: x, y: y - 1 },
                  { x: x, y: y + 1 }
                ];
                for (const n of neighbors) {
                  if (n.x >= 0 && n.x < width && n.y >= 0 && n.y < height) {
                    const nIdx = n.y * width + n.x;
                    if (visited[nIdx] === 0) {
                      visited[nIdx] = 1;
                      queue.push(n);
                    }
                  }
                }
              }
            }

            ctx.putImageData(imgData, 0, 0);
            characterImg.src = canvas.toDataURL('image/png');
          };
          img.src = '/assets/images/character-feature-test.png';
        } catch (e) {
          console.error("Failed to load/process character image", e);
        }
      }

      // Custom Gender Dropdown Toggle Logic
      const selectContainer = document.getElementById('gender-select-container');
      const dropdownOptions = document.getElementById('gender-dropdown-options');
      const selectedValueSpan = document.getElementById('gender-selected-value');

      if (selectContainer && dropdownOptions && selectedValueSpan) {
        selectContainer.addEventListener('click', (e) => {
          e.stopPropagation();
          const isVisible = dropdownOptions.style.display === 'block';
          dropdownOptions.style.display = isVisible ? 'none' : 'block';
        });

        const options = dropdownOptions.querySelectorAll('.gender-option');
        options.forEach(option => {
          option.addEventListener('click', (e) => {
            e.stopPropagation();
            const val = option.getAttribute('data-value');
            selectedValueSpan.textContent = val;
            selectedValueSpan.style.color = '#BCA695';
            localStorage.setItem('storymee_char_gender', val);

            // Toggle selected class
            options.forEach(opt => opt.classList.remove('selected'));
            option.classList.add('selected');

            dropdownOptions.style.display = 'none';
          });
        });

        // Load initial gender
        const savedGender = localStorage.getItem('storymee_char_gender');
        if (savedGender) {
          selectedValueSpan.textContent = savedGender;
          selectedValueSpan.style.color = '#BCA695';
          options.forEach(opt => {
            if (opt.getAttribute('data-value') === savedGender) {
              opt.classList.add('selected');
            } else {
              opt.classList.remove('selected');
            }
          });
        }

        // Close dropdown when clicking outside
        document.addEventListener('click', () => {
          dropdownOptions.style.display = 'none';
        });
      }

      // Birthday Input Mask & Validation (dd/mm format with month-specific day limits)
      const birthdayInput = document.getElementById('birthday-input');
      if (birthdayInput) {
        birthdayInput.addEventListener('input', function (e) {
          let value = e.target.value;

          // Remove all non-digit characters
          let digits = value.replace(/\D/g, '');

          let dayStr = digits.substring(0, 2);
          let monthStr = digits.substring(2, 4);

          let monthVal = 0;
          if (monthStr) {
            monthVal = parseInt(monthStr, 10);
            if (monthVal > 12) {
              monthVal = 12;
              monthStr = '12';
            } else if (monthVal === 0 && monthStr.length === 2) {
              monthVal = 1;
              monthStr = '01';
            }
          }

          // Determine max days based on month
          let maxDays = 31;
          if (monthVal === 2) {
            maxDays = 29;
          } else if ([4, 6, 9, 11].includes(monthVal)) {
            maxDays = 30;
          }

          if (dayStr) {
            let dayVal = parseInt(dayStr, 10);
            if (dayVal > maxDays) {
              dayStr = String(maxDays);
            } else if (dayVal === 0 && dayStr.length === 2) {
              dayStr = '01';
            }
          }

          let formatted = '';
          if (dayStr) {
            formatted += dayStr;
            if (digits.length > 2 || value.includes('/')) {
              formatted += '/' + monthStr;
            }
          }

          e.target.value = formatted;
        });

        birthdayInput.addEventListener('blur', function (e) {
          let value = e.target.value;
          if (!value) {
            e.target.placeholder = 'dd/mm';
            return;
          }
          let parts = value.split('/');
          let day = parts[0] || '';
          let month = parts[1] || '';

          if (day && day.length < 2) {
            day = day.padStart(2, '0');
          }
          if (month && month.length < 2) {
            month = month.padStart(2, '0');
          }

          if (day && !month) {
            month = '01';
          }

          if (day && month) {
            let dVal = parseInt(day, 10);
            let mVal = parseInt(month, 10);
            if (mVal > 12) mVal = 12;

            let maxD = 31;
            if (mVal === 2) {
              maxD = 29;
            } else if ([4, 6, 9, 11].includes(mVal)) {
              maxD = 30;
            }

            if (dVal > maxD) {
              day = String(maxD).padStart(2, '0');
            }
            month = String(mVal).padStart(2, '0');

            e.target.value = day + '/' + month;
          } else {
            e.target.value = '';
            e.target.placeholder = 'dd/mm';
          }
        });
      }

      // Age Input restriction (digits only)
      const ageInput = document.getElementById('age-input');
      if (ageInput) {
        ageInput.addEventListener('input', function (e) {
          e.target.value = e.target.value.replace(/\D/g, '');
        });
      }

      // Voice Inline Logic (The Sims 4 CAS style)
      const voiceSelectedSpan = document.getElementById('voice-selected-value');
      const voiceTypeBtns = document.querySelectorAll('.voice-type-btn');
      const voicePitchRange = document.getElementById('voice-pitch-range');
      const btnPlayVoicePreview = document.getElementById('btn-play-voice-preview');

      let currentVoiceType = "Ngọt ngào";
      let currentPitch = 0;

      if (voiceSelectedSpan) {
        // Voice Type Buttons click
        voiceTypeBtns.forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            voiceTypeBtns.forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            currentVoiceType = btn.getAttribute('data-value');
            updateVoiceDisplay();
          });
        });

        // Pitch slider input
        if (voicePitchRange) {
          voicePitchRange.addEventListener('input', (e) => {
            currentPitch = parseInt(e.target.value, 10);
            updateVoiceDisplay();
          });
        }

        // Preview speech synthesis
        if (btnPlayVoicePreview) {
          btnPlayVoicePreview.addEventListener('click', (e) => {
            e.stopPropagation();
            let previewText = "Chào bạn! Đây là giọng nói của mình.";
            if (currentVoiceType === "Ngọt ngào") {
              previewText = "Chào bạn nha! Giọng mình nghe ngọt ngào đúng không?";
            } else if (currentVoiceType === "Trong trẻo") {
              previewText = "Xin chào! Bạn có thấy giọng mình trong trẻo không?";
            } else if (currentVoiceType === "Mạnh mẽ") {
              previewText = "Xin chào! Bạn có thấy giọng mình mạnh mẽ không?";
            }

            if ('speechSynthesis' in window) {
              window.speechSynthesis.cancel();
              const utterance = new SpeechSynthesisUtterance(previewText);
              const pitchVal = 1 + (currentPitch / 100);
              utterance.pitch = Math.max(0.5, Math.min(2.0, pitchVal));

              const voices = window.speechSynthesis.getVoices();
              const viVoice = voices.find(v => v.lang.startsWith('vi'));
              if (viVoice) {
                utterance.voice = viVoice;
              }
              utterance.rate = 1.05;
              window.speechSynthesis.speak(utterance);
            }
          });
        }

        function updateVoiceDisplay() {
          let toneLabel = "";
          if (currentPitch < -15) {
            toneLabel = `Trầm`;
          } else if (currentPitch > 15) {
            toneLabel = `Bổng`;
          } else {
            toneLabel = `Trung bình`;
          }
          voiceSelectedSpan.textContent = `${currentVoiceType} (${toneLabel})`;
        }
      }

      // Random Name Dice button logic
      const nameInput = document.getElementById('name-input');
      const btnRandomName = document.getElementById('btn-random-name');
      const randomNames = [
        "Gia Bảo", "Minh Triết", "Hữu Phước", "Tuấn Kiệt", "Bảo Lâm", "Khôi Nguyên", "Thanh Phong",
        "Hoàng Bách", "Đức Anh", "Nhật Minh", "Hải Đăng", "Quang Khải", "Phúc Lâm", "Khánh An",
        "Tú Linh", "Khánh Vy", "Ngọc Diệp", "Hương Giang", "Thảo Nguyên", "Mai Chi", "Quỳnh Anh",
        "Phương Trúc", "Minh Thư", "Như Quỳnh", "Hoài An", "Bảo Châu", "Trang Nhung", "Hà Linh",
        "Oliver", "Leo", "Charlie", "Arthur", "Noah", "Oscar", "George", "Henry", "Thomas", "Jack",
        "Olivia", "Amelia", "Isla", "Ava", "Ivy", "Freya", "Lily", "Florence", "Mia", "Zoe",
        "Lucas", "Liam", "Ethan", "Mason", "Alexander", "Emily", "Sophia", "Chloe", "Grace", "Harper",
        "Leo Minh", "Zoe Linh", "Max Nam", "Mia Vy", "Jack Phong", "Lily Mai", "Lucas Bách", "Ruby Vân"
      ];

      if (btnRandomName && nameInput) {
        btnRandomName.addEventListener('click', (e) => {
          e.stopPropagation();

          // Trigger spin animation
          btnRandomName.classList.add('dice-spin');
          setTimeout(() => {
            btnRandomName.classList.remove('dice-spin');
          }, 500);

          // Get random name (avoid getting the same name twice consecutively)
          let newName = "";
          do {
            const randomIndex = Math.floor(Math.random() * randomNames.length);
            newName = randomNames[randomIndex];
          } while (newName === nameInput.value && randomNames.length > 1);

          nameInput.value = newName;
          nameInput.dispatchEvent(new Event('input', { bubbles: true }));
        });
      }

      // Auto-save name, age, gender, species to localStorage to sync with character creator prompt
      const speciesInput = document.getElementById('species-input');
      const ageInput = document.getElementById('age-input');
      
      // Load existing values from localStorage if available
      if (nameInput) {
        const savedName = localStorage.getItem('storymee_char_name');
        if (savedName) nameInput.value = savedName;
        
        nameInput.addEventListener('input', () => {
          localStorage.setItem('storymee_char_name', nameInput.value.trim());
        });
      }
      if (ageInput) {
        const savedAge = localStorage.getItem('storymee_char_age');
        if (savedAge) ageInput.value = savedAge;
        
        ageInput.addEventListener('input', () => {
          localStorage.setItem('storymee_char_age', ageInput.value.trim());
        });
      }
      if (speciesInput) {
        const savedSpecies = localStorage.getItem('storymee_char_species');
        if (savedSpecies) speciesInput.value = savedSpecies;
        
        speciesInput.addEventListener('input', () => {
          localStorage.setItem('storymee_char_species', speciesInput.value.trim());
        });
      }
    });

    function adjustScale() {
      const wrapper = document.querySelector('.scaler-wrapper');
      if (!wrapper) return;

      const targetWidth = 2080;
      const targetHeight = 930;
      const winWidth = window.innerWidth;
      const winHeight = window.innerHeight;

      const scale = Math.min(winWidth / targetWidth, winHeight / targetHeight);

      wrapper.style.transform = `translateX(-50%) scale(${scale})`;
    }

    window.addEventListener('resize', adjustScale);
    window.addEventListener('load', adjustScale);
    adjustScale();

    // High-fidelity synthesized Bubble SFX for transitions
    function playPopSound() {
      try {
        var ctx = new (window.AudioContext || window.webkitAudioContext)();
        var osc1 = ctx.createOscillator();
        var gain1 = ctx.createGain();
        var osc2 = ctx.createOscillator();
        var gain2 = ctx.createGain();

        osc1.connect(gain1);
        gain1.connect(ctx.destination);
        osc2.connect(gain2);
        gain2.connect(ctx.destination);

        var now = ctx.currentTime;

        osc1.type = 'triangle';
        osc1.frequency.setValueAtTime(200, now);
        osc1.frequency.exponentialRampToValueAtTime(1400, now + 0.15);

        gain1.gain.setValueAtTime(0, now);
        gain1.gain.linearRampToValueAtTime(0.25, now + 0.015);
        gain1.gain.exponentialRampToValueAtTime(0.01, now + 0.15);

        osc2.type = 'sine';
        osc2.frequency.setValueAtTime(850, now);
        osc2.frequency.exponentialRampToValueAtTime(1600, now + 0.02);
        osc2.frequency.exponentialRampToValueAtTime(450, now + 0.08);

        gain2.gain.setValueAtTime(0, now);
        gain2.gain.linearRampToValueAtTime(0.18, now + 0.005);
        gain2.gain.exponentialRampToValueAtTime(0.01, now + 0.08);

        osc1.start(now);
        osc1.stop(now + 0.16);
        osc2.start(now);
        osc2.stop(now + 0.09);
      } catch (e) {
        console.error("Audio Context error:", e);
      }
    }

    function playPopAndNavigate(url) {
      playPopSound();
      const loader = document.getElementById('page-loader-overlay');
      if (loader) {
        loader.style.display = 'flex';
        loader.offsetHeight; // Force reflow
        loader.style.opacity = '1';
      }
      setTimeout(function () {
        window.location.href = url;
      }, 350);
    }

    function hidePageLoader() {
      const loader = document.getElementById('page-loader-overlay');
      if (loader && loader.style.display !== 'none') {
        loader.style.opacity = '0';
        const content = document.querySelector('.scaler-wrapper');
        if (content) {
          content.style.opacity = '1';
        }
        setTimeout(() => {
          loader.style.display = 'none';
        }, 400);
      }
    }
    window.addEventListener('load', hidePageLoader);
    window.addEventListener('pageshow', (e) => {
      if (e.persisted) hidePageLoader();
    });
    setTimeout(hidePageLoader, 1500); // Safety fallback timeout
  </script>
