<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIkid Universe</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Bowlby+One&family=Bowlby+One+SC&family=Fredoka:wght@300..700&family=Inter:wght@800;900&family=Mali:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Chiron+GoRound+TC:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=202607141151">
    <script>
        // Skip meteor loading overlay when coming from the login page
        if (document.referrer.indexOf('/login') !== -1 || window.location.search.indexOf('from=login') !== -1) {
            document.write('<style>#page-loader-overlay { display: none !important; opacity: 0 !important; }</style>');
        }
    </script>
</head>

<body>

  <!-- Global Meteor Loading Overlay -->
  <div id="page-loader-overlay" style="
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: linear-gradient(135deg, #FF6B6B 0%, #FF8E53 55%, #FCE082 100%);
    /* Starry background effect for sunset */
    background-image: 
      radial-gradient(rgba(255,255,255,0.4), rgba(255,255,255,0.1) 2px, transparent 40px),
      radial-gradient(rgba(255,255,255,0.3), rgba(255,255,255,0.05) 1px, transparent 30px),
      linear-gradient(135deg, #FF6B6B 0%, #FF8E53 55%, #FCE082 100%);
    background-size: 550px 550px, 350px 350px, 100% 100%;
    background-position: 0 0, 40px 60px, 0 0;
    z-index: 999999;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 1;
    transition: opacity 0.4s ease;
    pointer-events: all;
    overflow: hidden;
  ">
    <style>
      @keyframes meteorFlight {
        0% {
          transform: translate(60vw, -60vh) rotate(150deg);
          opacity: 0;
        }
        10% {
          opacity: 1;
        }
        90% {
          opacity: 1;
        }
        100% {
          transform: translate(-60vw, 60vh) rotate(150deg);
          opacity: 0;
        }
      }
      @keyframes miniFlight {
        0% {
          transform: translate(60vw, -60vh) rotate(150deg);
          opacity: 0;
        }
        15% { opacity: 0.6; }
        85% { opacity: 0.6; }
        100% {
          transform: translate(-60vw, 60vh) rotate(150deg);
          opacity: 0;
        }
      }
      @keyframes loadingDots {
        0%, 20% { content: "."; }
        40% { content: ".."; }
        60%, 100% { content: "..."; }
      }
      .loading-dots::after {
        content: "";
        animation: loadingDots 1.5s infinite steps(1);
        display: inline-block;
        width: 24px;
        text-align: left;
      }
      .meteor-container {
        position: relative;
        width: 320px;
        height: 120px;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        animation: meteorFlight 2.2s cubic-bezier(0.25, 0.8, 0.25, 1) infinite;
        z-index: 10;
      }
      .meteor-head {
        width: 80px;
        height: 80px;
        background: radial-gradient(circle at 35% 35%, #FFF0F5 0%, #FFB6C1 25%, #FF5E97 60%, #9D1C7F 100%);
        border-radius: 50%;
        box-shadow: 
          0 0 25px rgba(255, 94, 151, 0.9),
          0 0 60px rgba(157, 28, 127, 0.6),
          0 0 120px rgba(157, 28, 127, 0.4);
        position: relative;
        flex-shrink: 0;
      }
      .meteor-crater {
        position: absolute;
        background: rgba(0, 0, 0, 0.08);
        border-radius: 50%;
        box-shadow: inset 1px 1px 2px rgba(0,0,0,0.15);
      }
      .meteor-crater-1 { width: 14px; height: 14px; top: 22px; left: 18px; }
      .meteor-crater-2 { width: 20px; height: 20px; top: 32px; left: 32px; }
      .meteor-crater-3 { width: 12px; height: 12px; top: 18px; left: 45px; }
      .meteor-crater-4 { width: 10px; height: 10px; top: 48px; left: 20px; }
      
      .meteor-trail {
        width: 600px;
        height: 70px;
        background: linear-gradient(to right, rgba(157, 28, 127, 0) 0%, rgba(157, 28, 127, 0.25) 35%, rgba(255, 94, 151, 0.75) 75%, rgba(255, 240, 245, 0.95) 100%);
        border-radius: 40px 0 0 40px;
        margin-right: -40px;
        filter: blur(2px);
      }
      .mini-meteor {
        position: absolute;
        width: 160px;
        height: 5px;
        background: linear-gradient(to right, rgba(255, 182, 193, 0) 0%, rgba(255, 255, 255, 0.9) 100%);
        border-radius: 9999px;
        opacity: 0;
        filter: blur(1.5px);
        transform: rotate(150deg);
      }
      .mini-1 {
        top: 15%;
        left: 10%;
        animation: miniFlight 1.6s linear infinite;
        animation-delay: 0.4s;
      }
      .mini-2 {
        top: 75%;
        left: 5%;
        animation: miniFlight 1.9s linear infinite;
        animation-delay: 0.9s;
      }
      .mini-3 {
        top: 85%;
        left: 50%;
        animation: miniFlight 1.4s linear infinite;
        animation-delay: 0.1s;
      }
    </style>

    <!-- Space Background Mini Meteors -->
    <div class="mini-meteor mini-1"></div>
    <div class="mini-meteor mini-2"></div>
    <div class="mini-meteor mini-3"></div>

    <!-- Main Meteor Container -->
    <div class="meteor-container">
      <div class="meteor-trail"></div>
      <div class="meteor-head">
        <div class="meteor-crater meteor-crater-1"></div>
        <div class="meteor-crater meteor-crater-2"></div>
        <div class="meteor-crater meteor-crater-3"></div>
        <div class="meteor-crater meteor-crater-4"></div>
      </div>
    </div>

    <!-- Glowing Loading Text -->
    <div style="margin-top: 50px; text-align: center; z-index: 20;">
      <h2 style="
        font-size: 2.2rem;
        font-weight: 900;
        color: #FFFFFF;
        font-family: 'Chiron GoRound TC', sans-serif;
        margin: 0;
        letter-spacing: 1px;
        text-shadow: 0 0 15px rgba(255, 94, 151, 0.9), 0 0 5px rgba(157, 28, 127, 0.5);
      ">Bé <span class="custom-đ">d</span>ợi chút nhé<span class="loading-dots"></span></h2>
    </div>
  </div>

    <!-- Header Bar -->
    <header class="lobby-header">
        <div class="lobby-logo" onclick="window.location.href='/'">
            <img src="assets/images/logo.svg" alt="StoryMee Logo" class="logo-image">
        </div>
        <button class="auth-btn" onclick="playPopAndNavigate('/login')">Đăng Nhập</button>
    </header>

    <div class="lobby-wrapper">
        <!-- Main Landing Content -->
        <div class="lobby-title-container">
            <img src="assets/images/title-home-vn.png?v=2.0" alt="LET'S PLAY AND LEARN!" class="lobby-title-img">
            <div class="sparkle sparkle-1"></div>
            <div class="sparkle sparkle-2"></div>
            <div class="sparkle sparkle-3"></div>
            <div class="sparkle sparkle-4"></div>
            <div class="sparkle sparkle-5"></div>
            <div class="sparkle sparkle-6"></div>
        </div>
        <div class="lobby-description">
            <p>Chào mừng bé đến với vũ trụ sáng tạo diệu kỳ! Hãy tự tay thiết kế nhân vật Mee đáng yêu, sáng tác những
                cuốn truyện tranh đầy màu sắc và ghi lại hành trình thú vị của riêng mình nhé!</p>
        </div>

        <button class="start-btn" onclick="window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' })">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" class="btn-icon">
                <path d="M8 5v14l11-7z" />
            </svg>
            <span>Bắt đầu</span>
        </button>

        <div class="lobby-mascot">
            <img src="assets/images/mascot.png" alt="StoryMee Kids" class="mascot-img">
        </div>

        <!-- Cards Navigation Grid -->
        <div class="lobby-card card-mee" onclick="playPopAndNavigate('/mee')">
            <img src="assets/images/card_mee.jpeg" alt="Mee Studio" class="card-img">
            <div class="card-label">
                <h2>mee</h2>
            </div>
        </div>

        <div class="lobby-card card-character" onclick="playPopAndNavigate('/character')">
            <img src="assets/images/home-character.jpeg" alt="Character Studio" class="card-img">
            <div class="card-label">
                <h2>Nhân<br>Vật</h2>
            </div>
        </div>

        <div class="lobby-card card-art" onclick="playPopAndNavigate('/art')">
            <img src="assets/images/card_art.jpeg" alt="Art Playground" class="card-img">
            <div class="card-label">
                <h2>Xưởng<br>Vẽ</h2>
            </div>
        </div>

        <div class="lobby-card card-diary" onclick="playPopAndNavigate('/diary')">
            <img src="assets/images/home-explore.jpeg" alt="Explore" class="card-img">
            <div class="card-label">
                <h2>Khám<br>Phá</h2>
            </div>
        </div>
    </div>

    <!-- Back to Top Button -->
    <button class="back-to-top-btn" onclick="window.scrollTo({ top: 0, behavior: 'smooth' })" aria-label="Back to top">
        <svg viewBox="0 0 24 24">
            <path d="M7.41 15.41L12 10.83l4.59 4.58L18 14l-6-6-6 6z" />
        </svg>
    </button>

    <!-- Responsive Auto-Scaling Script -->
    <script>
        function adjustScale() {
            const wrapper = document.querySelector('.lobby-wrapper');
            const header = document.querySelector('.lobby-header');
            const targetWidth = 2122.57;
            const targetHeight = 2200;
            const winWidth = window.innerWidth;

            const scale = winWidth / targetWidth;

            wrapper.style.transform = `scale(${scale})`;

            if (header) {
                header.style.transform = `scale(${scale})`;
                header.style.transformOrigin = 'top left';
                header.style.left = `${40 * scale}px`;
                header.style.top = `${38.04 * scale}px`;
            }

            const wrapperHeight = targetHeight * scale;
            document.body.style.minHeight = `${wrapperHeight}px`;
        }

        window.addEventListener('resize', adjustScale);
        window.addEventListener('load', adjustScale);
        adjustScale();


        // Show/hide back-to-top button on scroll
        window.addEventListener('scroll', () => {
            const btn = document.querySelector('.back-to-top-btn');
            if (btn) {
                const isBottom = (window.innerHeight + window.scrollY) >= (document.documentElement.scrollHeight - 20);
                if (isBottom) {
                    btn.classList.add('visible');
                } else {
                    btn.classList.remove('visible');
                }
            }
        });

        // High-fidelity synthesized Bubble SFX (Dual-Oscillator)
        function playPopSound() {
            try {
                var ctx = new (window.AudioContext || window.webkitAudioContext)();

                // 1. Warm resonance body
                var osc1 = ctx.createOscillator();
                var gain1 = ctx.createGain();

                // 2. High-frequency release click
                var osc2 = ctx.createOscillator();
                var gain2 = ctx.createGain();

                osc1.connect(gain1);
                gain1.connect(ctx.destination);

                osc2.connect(gain2);
                gain2.connect(ctx.destination);

                var now = ctx.currentTime;

                // --- Warm Resonant Body (Triangle Wave) ---
                osc1.type = 'triangle';
                osc1.frequency.setValueAtTime(200, now);
                osc1.frequency.exponentialRampToValueAtTime(350, now + 0.03);
                osc1.frequency.exponentialRampToValueAtTime(80, now + 0.15);

                gain1.gain.setValueAtTime(0, now);
                gain1.gain.linearRampToValueAtTime(0.35, now + 0.01);
                gain1.gain.exponentialRampToValueAtTime(0.01, now + 0.15);

                // --- High-frequency Release Click (Sine Wave) ---
                osc2.type = 'sine';
                osc2.frequency.setValueAtTime(850, now);
                osc2.frequency.exponentialRampToValueAtTime(1600, now + 0.02);
                osc2.frequency.exponentialRampToValueAtTime(450, now + 0.08);

                gain2.gain.setValueAtTime(0, now);
                gain2.gain.linearRampToValueAtTime(0.18, now + 0.005);
                gain2.gain.exponentialRampToValueAtTime(0.01, now + 0.08);

                osc1.start(now);
                osc1.stop(now + 0.16);

                osc2.start(now);
                osc2.stop(now + 0.09);
            } catch (e) {
                console.error("Web Audio API failed", e);
            }
        }

        function playPopAndNavigate(url) {
            playPopSound();
            const loader = document.getElementById('page-loader-overlay');
            if (loader) {
                loader.style.display = 'flex';
                loader.offsetHeight; // Force reflow
                loader.style.opacity = '1';
            }
            setTimeout(() => {
                window.location.href = url;
            }, 350);
        }

        let loaderFaded = false;
        let pageLoaded = false;

        function hidePageLoader() {
            pageLoaded = true;
            const loader = document.getElementById('page-loader-overlay');
            if (!loader || loader.style.display === 'none') {
                return;
            }

            performLoaderFadeOut(loader);
        }

        function performLoaderFadeOut(loader) {
            loader.style.opacity = '0';
            setTimeout(() => {
                loader.style.display = 'none';
            }, 400);
        }

        window.addEventListener('load', () => {
            hidePageLoader();
        });
        window.addEventListener('pageshow', (e) => {
            if (e.persisted) {
                loaderFaded = false;
                pageLoaded = false;
                hidePageLoader();
            }
        });
    </script>
</body>

</html>
