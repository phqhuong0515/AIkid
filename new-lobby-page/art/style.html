  <style>
    /* Custom high-fidelity rounded Vietnamese letter đ */
    .custom-đ {
      position: relative;
      display: inline-block;
      font-family: 'Chiron GoRound TC', sans-serif !important;
    }
    .custom-đ::after {
      content: "";
      position: absolute;
      width: 0.46em;
      height: 0.12em;
      background: currentColor;
      border-radius: 9999px;
      top: 0.32em;
      left: 0.27em;
    }

    /* Clean layout and centering */
    body {
      background-image: url('/mee/PNG/bg-art.png') !important;
      background-repeat: no-repeat;
      background-position: center center;
      background-size: cover;
      background-attachment: fixed;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Mali', 'Chiron GoRound TC', sans-serif;
      box-sizing: border-box;
      overflow: hidden;
    }

    /* Outer Wrapper for responsive scaling */
    .style-selection-wrapper {
      width: 100%;
      overflow: visible;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
      margin-top: 240px;
    }

    /* Absolute Positioned Style Grid */
    .style-grid {
      position: relative;
      width: 100%;
      height: 480px;
      box-sizing: border-box;
      margin: 40px 0;
    }

    /* Base Card Styling - Absolute Center and transformed by JS */
    .style-card {
      position: absolute;
      left: 50%;
      top: 50px;
      margin-left: -170px;
      width: 340px;
      height: 340px;
      aspect-ratio: 1 / 1;
      cursor: pointer;
      transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1),
        opacity 0.6s cubic-bezier(0.25, 1, 0.5, 1);
      overflow: visible;
      display: flex;
      flex-direction: column;
    }

    /* Inner Wrapper containing frame background, border, and shadow to lift all together */
    .card-inner {
      width: 100%;
      height: 100%;
      background: #FFFFFF;
      border: 10px solid #FFFFFF;
      border-radius: 48px;
      box-shadow: 0 15px 45px rgba(0, 0, 0, 0.15);
      outline: 6px solid rgba(255, 92, 138, 0);
      /* Default inactive outline: transparent pink */
      overflow: visible;
      transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1),
        border-color 0.3s,
        box-shadow 0.3s,
        outline 0.5s cubic-bezier(0.25, 1, 0.5, 1);
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
    }

    .style-card:hover .card-inner {
      transform: translateY(-16px);
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.25);
    }

    /* Card Image Wrapper with skeleton color */
    .card-image-container {
      width: 100%;
      height: 100%;
      border-radius: 36px;
      overflow: hidden;
      box-sizing: border-box;
      background: #f1f5f9;
    }

    .style-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s;
    }

    .style-card:hover .style-img {
      transform: scale(1.06);
    }

    /* Tags at the top of the cards */
    .card-tag {
      position: absolute;
      top: -26px;
      left: 30px;
      color: #FFFFFF;
      font-family: 'Chiron GoRound TC', 'Fredoka', sans-serif;
      font-weight: 950;
      font-size: 1.5rem;
      padding: 8px 30px;
      border-radius: 20px;
      border: 4px solid #FFFFFF;
      text-transform: uppercase;
      z-index: 10;
      transition: all 0.3s ease;
      line-height: 1.1;
      letter-spacing: 0.5px;
    }

    /* Shift text down by 1px for cards with accented Vietnamese characters */
    .card-tag.has-diacritics {
      padding-top: 9px;
      padding-bottom: 7px;
    }

    /* Specific Tag gradients (repeats for 9 styles) */
    .style-card:nth-child(9n+1) .card-tag {
      background: linear-gradient(135deg, #FF8E53, #FF2E93);
      box-shadow: 0 8px 20px rgba(255, 46, 147, 0.4);
    }

    .style-card:nth-child(9n+2) .card-tag {
      background: linear-gradient(135deg, #00C6FF, #0072FF);
      box-shadow: 0 8px 25px rgba(0, 114, 255, 0.5);
    }

    .style-card:nth-child(9n+3) .card-tag {
      background: linear-gradient(135deg, #11998e, #38ef7d);
      box-shadow: 0 8px 20px rgba(56, 239, 125, 0.4);
    }

    .style-card:nth-child(9n+4) .card-tag {
      background: linear-gradient(135deg, #FF9966, #FF5E62);
      box-shadow: 0 8px 20px rgba(255, 94, 98, 0.4);
    }

    .style-card:nth-child(9n+5) .card-tag {
      background: linear-gradient(135deg, #7F00FF, #E100FF);
      box-shadow: 0 8px 20px rgba(225, 0, 255, 0.4);
    }

    .style-card:nth-child(9n+6) .card-tag {
      background: linear-gradient(135deg, #F857A6, #FF5858);
      box-shadow: 0 8px 20px rgba(248, 87, 166, 0.4);
    }

    .style-card:nth-child(9n+7) .card-tag {
      background: linear-gradient(135deg, #4da0b0, #d39d38);
      box-shadow: 0 8px 20px rgba(77, 160, 176, 0.4);
    }

    .style-card:nth-child(9n+8) .card-tag {
      background: linear-gradient(135deg, #1A2980, #26D0CE);
      box-shadow: 0 8px 20px rgba(38, 208, 206, 0.4);
    }

    .style-card:nth-child(9n+9) .card-tag {
      background: linear-gradient(135deg, #f12711, #f5af19);
      box-shadow: 0 8px 20px rgba(245, 175, 25, 0.4);
    }

    /* Active Highlighted State applied to card-inner */
    .style-card.active {
      z-index: 5;
    }

    .style-card.active .card-inner {
      border: 12px solid #FFFFFF;
      outline: 6px solid rgba(255, 255, 255, 0.45);
      box-shadow: 0 0 35px rgba(255, 255, 255, 0.5), 0 25px 55px rgba(0, 0, 0, 0.28);
    }

    .style-card.active .card-tag {
      left: 20px;
    }

    /* Back Button styling */
    .back-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 25px rgba(255, 117, 151, 0.45);
      background: linear-gradient(135deg, #ff5780, #ff7597) !important;
    }

    /* Toast Notification for Selections (Moved to the Top) */
    .selection-toast {
      position: fixed;
      top: 190px;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      width: 420px;
      white-space: nowrap;
      box-sizing: border-box;
      background: #FF5C8A;
      border: 4px solid #FFFFFF;
      color: #FFFFFF;
      font-family: 'Mali', sans-serif;
      font-size: 1.3rem;
      font-weight: 700;
      padding: 16px 24px;
      border-radius: 35px;
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.25);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 10000;
      pointer-events: none;
      text-align: center;
    }

    .selection-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Centered Continue Button styling at the bottom */
    .continue-btn-container {
      position: absolute;
      left: 50%;
      transform: translateX(-50%) scale(1.1);
      transform-origin: bottom center;
      bottom: 20px;
      z-index: 1000;
    }

    .continue-btn {
      background: linear-gradient(135deg, #ff7597, #ff9eb5);
      /* Match reversed gradient of image-generate back button */
      border: none;
      border-radius: 35px;
      color: white;
      font-family: 'Mali', sans-serif;
      font-weight: 700;
      font-size: 1.5rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      width: 220px;
      height: 70px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      box-shadow: 0 12px 35px rgba(255, 117, 151, 0.35);
      transition: all 0.2s ease;
    }

    .continue-btn:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 40px rgba(255, 117, 151, 0.5);
      background: linear-gradient(135deg, #ff5780, #ff7597);
    }

    .continue-btn:active {
      transform: translateY(-2px);
    }

    /* UI Scaler Wrapper for Header and Back Button */
    .scaler-wrapper {
      box-sizing: border-box;
      position: absolute;
      top: 0;
      left: 50%;
      width: 1927.63px;
      height: 930px;
      transform-origin: top center;
      transform: translateX(-50%) scale(1);
      pointer-events: none;
      z-index: 1000;
    }

    .scaler-wrapper > * {
      pointer-events: auto;
    }

    /* Art Page exact Header styles */
    .art-header {
      position: absolute;
      left: 38px;
      top: 35px;
      width: 1844.3px;
      height: 76.17px;
      background: rgba(253, 250, 244, 0.8);
      border-radius: 24px;
      padding: 0 50px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-sizing: border-box;
      opacity: 1;
    }

    .art-logo {
      display: flex;
      align-items: center;
      cursor: pointer;
      margin-left: -10px;
    }

    .art-logo img {
      height: 58px;
      width: auto;
      object-fit: contain;
      display: block;
    }

    .auth-btn {
      font-family: 'Mali', sans-serif;
      font-weight: 800;
      font-size: 1.52rem;
      color: #FFFFFF;
      background: linear-gradient(135deg, #FF5C8A, #FF8E53);
      border: none;
      padding: 11px 40px;
      height: 55px;
      border-radius: 9999px;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(255, 92, 138, 0.2);
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .auth-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(255, 92, 138, 0.35);
      background: linear-gradient(135deg, #FF7096, #FFA072);
      color: #FFFFFF;
    }
  </style>
</head>

<body>
  <!-- Global Meteor Loading Overlay -->
  <div id="page-loader-overlay" style="
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: linear-gradient(135deg, #FF6B6B 0%, #FF8E53 55%, #FCE082 100%);
    /* Starry background effect for sunset */
    background-image: 
      radial-gradient(rgba(255,255,255,0.4), rgba(255,255,255,0.1) 2px, transparent 40px),
      radial-gradient(rgba(255,255,255,0.3), rgba(255,255,255,0.05) 1px, transparent 30px),
      linear-gradient(135deg, #FF6B6B 0%, #FF8E53 55%, #FCE082 100%);
    background-size: 550px 550px, 350px 350px, 100% 100%;
    background-position: 0 0, 40px 60px, 0 0;
    z-index: 999999;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 1;
    transition: opacity 0.4s ease;
    pointer-events: all;
    overflow: hidden;
  ">
    <style>
      @keyframes meteorFlight {
        0% {
          transform: translate(60vw, -60vh) rotate(150deg);
          opacity: 0;
        }
        10% {
          opacity: 1;
        }
        90% {
          opacity: 1;
        }
        100% {
          transform: translate(-60vw, 60vh) rotate(150deg);
          opacity: 0;
        }
      }
      @keyframes miniFlight {
        0% {
          transform: translate(60vw, -60vh) rotate(150deg);
          opacity: 0;
        }
        15% { opacity: 0.6; }
        85% { opacity: 0.6; }
        100% {
          transform: translate(-60vw, 60vh) rotate(150deg);
          opacity: 0;
        }
      }
      @keyframes loadingDots {
        0%, 20% { content: "."; }
        40% { content: ".."; }
        60%, 100% { content: "..."; }
      }
      .loading-dots::after {
        content: "";
        animation: loadingDots 1.5s infinite steps(1);
        display: inline-block;
        width: 24px;
        text-align: left;
      }
      .meteor-container {
        position: relative;
        width: 320px;
        height: 120px;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        animation: meteorFlight 2.2s cubic-bezier(0.25, 0.8, 0.25, 1) infinite;
        z-index: 10;
      }
      .meteor-head {
        width: 80px;
        height: 80px;
        background: radial-gradient(circle at 35% 35%, #FFF0F5 0%, #FFB6C1 25%, #FF5E97 60%, #9D1C7F 100%);
        border-radius: 50%;
        box-shadow: 
          0 0 25px rgba(255, 94, 151, 0.9),
          0 0 60px rgba(157, 28, 127, 0.6),
          0 0 120px rgba(157, 28, 127, 0.4);
        position: relative;
        flex-shrink: 0;
      }
      .meteor-crater {
        position: absolute;
        background: rgba(0, 0, 0, 0.08);
        border-radius: 50%;
        box-shadow: inset 1px 1px 2px rgba(0,0,0,0.15);
      }
      .meteor-crater-1 { width: 14px; height: 14px; top: 22px; left: 18px; }
      .meteor-crater-2 { width: 20px; height: 20px; top: 32px; left: 32px; }
      .meteor-crater-3 { width: 12px; height: 12px; top: 18px; left: 45px; }
      .meteor-crater-4 { width: 10px; height: 10px; top: 48px; left: 20px; }
      
      .meteor-trail {
        width: 600px;
        height: 70px;
        background: linear-gradient(to right, rgba(157, 28, 127, 0) 0%, rgba(157, 28, 127, 0.25) 35%, rgba(255, 94, 151, 0.75) 75%, rgba(255, 240, 245, 0.95) 100%);
        border-radius: 40px 0 0 40px;
        margin-right: -40px;
        filter: blur(2px);
      }
      .mini-meteor {
        position: absolute;
        width: 160px;
        height: 5px;
        background: linear-gradient(to right, rgba(255, 182, 193, 0) 0%, rgba(255, 255, 255, 0.9) 100%);
        border-radius: 9999px;
        opacity: 0;
        filter: blur(1.5px);
        transform: rotate(150deg);
      }
      .mini-1 {
        top: 15%;
        left: 10%;
        animation: miniFlight 1.6s linear infinite;
        animation-delay: 0.4s;
      }
      .mini-2 {
        top: 75%;
        left: 5%;
        animation: miniFlight 1.9s linear infinite;
        animation-delay: 0.9s;
      }
      .mini-3 {
        top: 85%;
        left: 50%;
        animation: miniFlight 1.4s linear infinite;
        animation-delay: 0.1s;
      }
    </style>

    <!-- Space Background Mini Meteors -->
    <div class="mini-meteor mini-1"></div>
    <div class="mini-meteor mini-2"></div>
    <div class="mini-meteor mini-3"></div>

    <!-- Main Meteor Container -->
    <div class="meteor-container">
      <div class="meteor-trail"></div>
      <div class="meteor-head">
        <div class="meteor-crater meteor-crater-1"></div>
        <div class="meteor-crater meteor-crater-2"></div>
        <div class="meteor-crater meteor-crater-3"></div>
        <div class="meteor-crater meteor-crater-4"></div>
      </div>
    </div>

    <!-- Glowing Loading Text -->
    <div style="margin-top: 50px; text-align: center; z-index: 20;">
      <h2 style="
        font-size: 2.2rem;
        font-weight: 900;

      ">Bé <span class="custom-đ">d</span>ợi chút nhé<span class="loading-dots"></span></h2>
    </div>
  </div>

          <div class="card-tag has-diacritics">Vải Nỉ</div>
          <div class="card-image-container">
            <img src="/mee/PNG/art-style-farbic.jpeg" alt="Vải Nỉ" class="style-img">
          </div>
        </div>
      </div>

      <!-- Card 13: Manhwa -->
      <div class="style-card card-manhwa" onclick="selectStyle(this, 'Manhwa', 12)">
        <div class="card-inner">
          <div class="card-tag">Manhwa</div>
          <div class="card-image-container">
            <img src="/mee/PNG/art-style-manhwa.jpeg" alt="Manhwa" class="style-img">
          </div>
        </div>
      </div>

      <!-- Card 14: Bán Tả Thực -->
      <div class="style-card card-semirealistic" onclick="selectStyle(this, 'Bán Tả Thực', 13)">
        <div class="card-inner">
          <div class="card-tag has-diacritics">Bán Tả Thực</div>
          <div class="card-image-container">
            <img src="/mee/PNG/art-style-semirealistic.jpeg" alt="Bán Tả Thực" class="style-img">
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast for User Interaction (Top-centered) -->
  <div id="toast" class="selection-toast">Đã chọn phong cách Màu Nước!</div>

  <!-- Centered Action Button (Width matches Toast) -->
  <div class="continue-btn-container">
    <button class="continue-btn" onclick="playPopAndNavigate('/art/image-generate')">
      <span>Chọn</span>
    </button>
  </div>
  </div>

  <script>
    // --- UI Scaler Logic ---
    function adjustScale() {
      const wrapper = document.querySelector('.scaler-wrapper');
      if (!wrapper) return;

      const targetWidth = 1927.63;
      const targetHeight = 930;
      const winWidth = window.innerWidth;
      const winHeight = window.innerHeight;

      // Fit both width and height to prevent scrolling
      const scale = Math.min(winWidth / targetWidth, winHeight / targetHeight);
      wrapper.style.transform = `translateX(-50%) scale(${scale})`;
    }

    window.addEventListener('resize', adjustScale);
    window.addEventListener('load', adjustScale);
    adjustScale();

    // Audio synthesis for bubble pop
    function playPopSound() {
      try {
        var ctx = new (window.AudioContext || window.webkitAudioContext)();
        var osc1 = ctx.createOscillator();
        var gain1 = ctx.createGain();
        var osc2 = ctx.createOscillator();
        var gain2 = ctx.createGain();

        osc1.connect(gain1);
        gain1.connect(ctx.destination);
        osc2.connect(gain2);
        gain2.connect(ctx.destination);

        var now = ctx.currentTime;

        osc1.type = 'triangle';
        osc1.frequency.setValueAtTime(200, now);
        osc1.frequency.exponentialRampToValueAtTime(350, now + 0.03);
        osc1.frequency.exponentialRampToValueAtTime(80, now + 0.15);

        gain1.gain.setValueAtTime(0, now);
        gain1.gain.linearRampToValueAtTime(0.35, now + 0.01);
        gain1.gain.exponentialRampToValueAtTime(0.01, now + 0.15);

        osc2.type = 'sine';
        osc2.frequency.setValueAtTime(850, now);
        osc2.frequency.exponentialRampToValueAtTime(1600, now + 0.02);
        osc2.frequency.exponentialRampToValueAtTime(450, now + 0.08);

        gain2.gain.setValueAtTime(0, now);
        gain2.gain.linearRampToValueAtTime(0.18, now + 0.005);
        gain2.gain.exponentialRampToValueAtTime(0.01, now + 0.08);

        osc1.start(now);
        osc1.stop(now + 0.16);
        osc2.start(now);
        osc2.stop(now + 0.09);
      } catch (e) {
        console.error("Audio Context error:", e);
      }
    }

    function playPopAndNavigate(url) {
      playPopSound();
      setTimeout(function () {
        window.location.href = url;
      }, 180);
    }

    // Dynamic Visual Settings
    const baseWidth = 320;
    const activeScale = 1.10;
    const d1Scale = 0.9;
    const d2Scale = 0.8;
    const g1 = 48; // Gap between active card and adjacent inactive card
    const g2 = 30; // Gap between the two inactive cards (set to exactly 30px)

    function getScaleForDistance(distance) {
      if (distance === 0) return activeScale;
      if (distance === 1) return d1Scale;
      if (distance === 2) return d2Scale;
      return Math.max(0.5, d2Scale - (distance - 2) * 0.05);
    }

    function getOpacityForDistance(distance) {
      if (distance === 0) return 1.0;
      if (distance === 1) return 0.75;
      if (distance === 2) return 0.65;
      if (distance === 3) return 0.2; // Fade out quickly
      return 0.0; // Completely hidden
    }

    function getCardOffset(d) {
      if (d === 0) return 0;
      let x = 0;
      x += (baseWidth * activeScale) / 2 + g1;
      x += (baseWidth * d1Scale) / 2;
      for (let i = 2; i <= d; i++) {
        x += (baseWidth * getScaleForDistance(i - 1)) / 2;
        x += g2;
        x += (baseWidth * getScaleForDistance(i)) / 2;
      }
      return x;
    }

    function updateCardPositions(activeIndex) {
      console.log("updateCardPositions called for active index:", activeIndex);
      const cards = document.querySelectorAll('.style-card');

      cards.forEach((card, j) => {
        const d = Math.abs(j - activeIndex);
        const scale = getScaleForDistance(d);
        const opacity = getOpacityForDistance(d);
        const direction = j > activeIndex ? 1 : -1;
        const x = direction * getCardOffset(d);

        card.style.transform = `translateX(${x}px) scale(${scale})`;
        card.style.opacity = opacity;
        card.style.zIndex = 10 - d;

        // Hide card completely from screen readers and cursor interactions when opacity is 0
        if (opacity === 0) {
          card.style.visibility = 'hidden';
          card.style.pointerEvents = 'none';
        } else {
          card.style.visibility = 'visible';
          card.style.pointerEvents = 'auto';
        }
      });
    }

    let toastTimeout = null;

    function selectStyle(element, styleName, index) {
      playPopSound();

      // Toggle active states
      document.querySelectorAll('.style-card').forEach(card => {
        card.classList.remove('active');
      });
      element.classList.add('active');

      // Center the active card dynamically
      updateCardPositions(index);

      // Save selected style name
      localStorage.setItem('storymee_selected_style', styleName);

      // Show toast
      const toast = document.getElementById('toast');
      toast.innerText = `Đã chọn phong cách ${styleName}!`;
      toast.classList.add('show');

      if (toastTimeout) {
        clearTimeout(toastTimeout);
      }

      toastTimeout = setTimeout(() => {
        toast.classList.remove('show');
      }, 2500);
    }

    // Centering and positioning on DOM load
    function init() {
      console.log("Initializing style selection positions...");
      updateCardPositions(0);
    }

    if (document.readyState === 'loading') {
      window.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>

  <!-- Global Loader Overlay controller -->
  <script>
    (function() {
      let loaderFaded = false;
      let pageLoaded = false;

      function hidePageLoader() {
        pageLoaded = true;
        const loader = document.getElementById('page-loader-overlay');
        if (!loader || loader.style.display === 'none') {
          return;
        }

        performLoaderFadeOut(loader);
      }

      function performLoaderFadeOut(loader) {
        loader.style.opacity = '0';
        setTimeout(() => {
          loader.style.display = 'none';
        }, 400);
      }

      window.addEventListener('load', () => {
        hidePageLoader();
      });
      window.addEventListener('pageshow', (e) => {
        if (e.persisted) {
          loaderFaded = false;
          pageLoaded = false;
          hidePageLoader();
        }
      });
    })();
  </script>
  <script src="/aikid-nav-bridge.js"></script>
</body>
