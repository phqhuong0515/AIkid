<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sáng Tác Truyện - AIkid</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bowlby+One&family=Fredoka:wght@400;500;600;700&family=Mali:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Chiron+GoRound+TC:wght@900&display=swap" rel="stylesheet">
  
  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Link to common universe styles -->
  <link rel="stylesheet" href="/mee/styles.css">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-image: url('/assets/images/bg-art.png') !important;
      background-repeat: no-repeat !important;
      background-position: center center !important;
      background-size: cover !important;
      background-attachment: fixed !important;
      background-color: #FED7D7 !important;
      font-family: 'Mali', sans-serif;
      box-sizing: border-box;
      position: relative;
    }

    .scaler-wrapper {
      position: absolute;
      top: 0;
      left: 50%;
      width: 1927.63px;
      height: 930px;
      transform-origin: top center;
      transform: translateX(-50%) scale(1);
      background: transparent !important;
      overflow: hidden;
      pointer-events: none;
    }

    .genre-card:hover {
      transform: translateY(-5px) scale(1.02);
      border-color: #ff7597 !important;
      box-shadow: 0 10px 20px rgba(255, 117, 151, 0.1) !important;
    }
    .genre-card.selected {
      border-color: #ff7597 !important;
      background: #FFF0F3 !important;
      box-shadow: 0 10px 20px rgba(255, 117, 151, 0.15) !important;
    }

    .scaler-wrapper > * {
      pointer-events: auto;
    }

    .custom-đ {
      position: relative;
      display: inline-block;
      font-family: 'Chiron GoRound TC', sans-serif !important;
    }
    .custom-đ::after {
      content: "";
      position: absolute;
      width: 0.46em;
      height: 0.12em;
      background: currentColor;
      border-radius: 9999px;
      top: 0.32em;
      left: 0.27em;
    }

    #page-loader-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: linear-gradient(135deg, #FF6B6B 0%, #FF8E53 55%, #FCE082 100%);
      background-image: 
        radial-gradient(rgba(255,255,255,0.4), rgba(255,255,255,0.1) 2px, transparent 40px),
        radial-gradient(rgba(255,255,255,0.3), rgba(255,255,255,0.05) 1px, transparent 30px),
        linear-gradient(135deg, #FF6B6B 0%, #FF8E53 55%, #FCE082 100%);
      background-size: 550px 550px, 350px 350px, 100% 100%;
      background-position: 0 0, 40px 60px, 0 0;
      z-index: 999999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 1;
      transition: opacity 0.4s ease;
      pointer-events: all;
      overflow: hidden;
    }
    @keyframes meteorFlight {
      0% { transform: translate(60vw, -60vh) rotate(150deg); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translate(-60vw, 60vh) rotate(150deg); opacity: 0; }
    }
    @keyframes miniFlight {
      0% { transform: translate(60vw, -60vh) rotate(150deg); opacity: 0; }
      15% { opacity: 0.6; }
      85% { opacity: 0.6; }
      100% { transform: translate(-60vw, 60vh) rotate(150deg); opacity: 0; }
    }
    @keyframes loadingDots {
      0%, 20% { content: "."; }
      40% { content: ".."; }
      60%, 100% { content: "..."; }
    }
    .loading-dots::after {
      content: "";
      animation: loadingDots 1.5s infinite steps(1);
      display: inline-block;
      width: 24px;
      text-align: left;
    }
    .meteor-container {
      position: relative;
      width: 320px;
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      animation: meteorFlight 2.2s cubic-bezier(0.25, 0.8, 0.25, 1) infinite;
      z-index: 10;
    }
    .meteor-head {
      width: 80px;
      height: 80px;
      background: radial-gradient(circle at 35% 35%, #FFF0F5 0%, #FFB6C1 25%, #FF5E97 60%, #9D1C7F 100%);
      border-radius: 50%;
      box-shadow: 0 0 25px rgba(255, 94, 151, 0.9), 0 0 60px rgba(157, 28, 127, 0.6), 0 0 120px rgba(157, 28, 127, 0.4);
      position: relative;
      flex-shrink: 0;
    }
    .meteor-crater {
      position: absolute;
      background: rgba(0, 0, 0, 0.08);
      border-radius: 50%;
      box-shadow: inset 1px 1px 2px rgba(0,0,0,0.15);
    }
    .meteor-crater-1 { width: 14px; height: 14px; top: 22px; left: 18px; }
    .meteor-crater-2 { width: 20px; height: 20px; top: 32px; left: 32px; }
    .meteor-crater-3 { width: 12px; height: 12px; top: 18px; left: 45px; }
    .meteor-crater-4 { width: 10px; height: 10px; top: 48px; left: 20px; }
    .meteor-trail {
      width: 600px;
      height: 70px;
      background: linear-gradient(to right, rgba(157, 28, 127, 0) 0%, rgba(157, 28, 127, 0.25) 35%, rgba(255, 94, 151, 0.75) 75%, rgba(255, 240, 245, 0.95) 100%);
      border-radius: 40px 0 0 40px;
      margin-right: -40px;
      filter: blur(2px);
    }
    .mini-meteor {
      position: absolute;
      width: 160px;
      height: 5px;
      background: linear-gradient(to right, rgba(255, 182, 193, 0) 0%, rgba(255, 255, 255, 0.9) 100%);
      border-radius: 9999px;
      opacity: 0;
      filter: blur(1.5px);
      transform: rotate(150deg);
    }
    .mini-1 { top: 25%; left: 15%; animation: miniFlight 1.6s linear infinite; animation-delay: 0.4s; }
    .mini-2 { top: 75%; left: 5%; animation: miniFlight 1.9s linear infinite; animation-delay: 0.9s; }
    .mini-3 { top: 85%; left: 50%; animation: miniFlight 1.4s linear infinite; animation-delay: 0.1s; }

    /* 2-Column Cards Container */
    .lobby-cards-container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -40%);
      display: flex;
      gap: 50px;
      justify-content: center;
      align-items: center;
      width: 90%;
      max-width: 860px;
      z-index: 10;
      pointer-events: none;
    }

    /* Individual Card with white border and solid #FDFAF4 background */
    .lobby-card-item {
      position: relative;
      flex: 1;
      height: 380px;
      background: #FDFAF4 !important;
      border: 10px solid #FFFFFF;
      border-radius: 48px;
      box-shadow: 0 15px 45px rgba(0, 0, 0, 0.15);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.3s cubic-bezier(0.25, 1, 0.5, 1);
      pointer-events: auto;
      box-sizing: border-box;
    }

    .lobby-card-item:hover {
      transform: translateY(-16px);
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.25);
    }

    .lobby-card-item:active {
      transform: translateY(-8px) scale(0.98);
    }

    /* Content wrapper */
    .lobby-card-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    /* Gradient Pink Icon */
    .lobby-card-icon {
      font-size: 5rem;
      background: linear-gradient(135deg, #FF5E97 0%, #FF9EB5 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: inline-block;
      transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
    }

    @keyframes iconWiggle {
      0% { transform: scale(1) rotate(0deg); }
      25% { transform: scale(1.1) rotate(-8deg); }
      75% { transform: scale(1.1) rotate(8deg); }
      100% { transform: scale(1) rotate(0deg); }
    }
    .lobby-card-item:hover .lobby-card-icon {
      animation: iconWiggle 1.0s ease-in-out infinite;
    }

    .lobby-card-title {
      font-family: 'Chiron GoRound TC', sans-serif;
      font-weight: 900;
      font-size: 1.6rem;
      color: #475569;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 5px;
    }

    /* Toast Message */
    .toast-message {
        position: fixed;
        bottom: -80px;
        left: 50%;
        transform: translateX(-50%);
        background: #334155;
        color: #FFFFFF;
        padding: 16px 32px;
        border-radius: 20px;
        font-family: 'Mali', sans-serif;
        font-weight: 600;
        font-size: 1.1rem;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        z-index: 1000000;
        transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .toast-message.show {
        bottom: 40px;
    }

    /* Create Type Modal */
    .create-modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      background: rgba(15, 23, 42, 0.4);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999999;
      opacity: 0;
      pointer-events: none;
      transition: all 0.35s ease;
    }
    .create-modal-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }
    .create-modal-card {
      background: #FFFFFF;
      width: 90%;
      max-width: 600px;
      border-radius: 36px;
      padding: 30px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.15);
      transform: translateY(30px) scale(0.95);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      position: relative;
    }
    .create-modal-overlay.show .create-modal-card {
      transform: translateY(0) scale(1);
    }
    .create-modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    .create-modal-title {
      font-family: 'Chiron GoRound TC', sans-serif;
      font-weight: 900;
      font-size: 1.8rem;
      color: #475569;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .create-modal-close-btn {
      background: #F1F5F9;
      border: none;
      width: 40px; height: 40px;
      border-radius: 50%;
      color: #64748B;
      font-size: 1.2rem;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .create-modal-close-btn:hover {
      background: #E2E8F0;
      color: #0F172A;
      transform: rotate(90deg);
    }
    .create-options-container {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .create-option-card {
      background: #FDFAF4;
      border: 3px dashed #E2D9CF;
      border-radius: 20px;
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 20px;
      cursor: pointer;
      transition: all 0.25s ease;
    }
    .create-option-card:hover:not(.locked) {
      background: #FFF5F7;
      border-color: #FF9EB5;
      transform: translateX(6px);
      box-shadow: 0 8px 20px rgba(255, 158, 181, 0.2);
    }
    .create-option-card.locked {
      opacity: 0.55;
      cursor: not-allowed;
      filter: grayscale(100%);
    }
    .create-option-icon {
      width: 60px; height: 60px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      color: white;
      flex-shrink: 0;
    }
    .create-option-info {
      flex: 1;
    }
    .create-option-name {
      font-family: 'Chiron GoRound TC', sans-serif;
      font-weight: 900;
      font-size: 1.3rem;
      color: #334155;
      margin: 0 0 4px 0;
    }
    .create-option-desc {
      font-family: 'Mali', sans-serif;
      font-size: 0.95rem;
      color: #64748B;
      margin: 0;
      line-height: 1.4;
    }
    .lock-icon-badge {
      font-size: 1.4rem;
      color: #94A3B8;
    }
  </style>
</head>

<body>

  <!-- Global Meteor Loading Overlay -->
  <div id="page-loader-overlay">
    <!-- Space Background Mini Meteors -->
    <div class="mini-meteor mini-1"></div>
    <div class="mini-meteor mini-2"></div>
    <div class="mini-meteor mini-3"></div>

    <!-- Main Meteor Container -->
    <div class="meteor-container">
      <div class="meteor-trail"></div>
      <div class="meteor-head">
        <div class="meteor-crater meteor-crater-1"></div>
        <div class="meteor-crater meteor-crater-2"></div>
        <div class="meteor-crater meteor-crater-3"></div>
        <div class="meteor-crater meteor-crater-4"></div>
      </div>
    </div>

    <!-- Glowing Loading Text -->
    <div style="margin-top: 50px; text-align: center; z-index: 20;">
      <h2 style="
        font-size: 2.2rem;
        font-weight: 900;
        color: #FFFFFF;
        font-family: 'Chiron GoRound TC', sans-serif;
        margin: 0;
        letter-spacing: 1px;
        text-shadow: 0 0 15px rgba(255, 94, 151, 0.9), 0 0 5px rgba(157, 28, 127, 0.5);
      ">Bé <span class="custom-đ">d</span>ợi chút nhé<span class="loading-dots"></span></h2>
    </div>
  </div>

  <div class="scaler-wrapper">
    <!-- Top Navigation Header from StoryMee Universe -->
    <header class="universe-header">
      <div class="universe-header-left">
        <div class="universe-logo" onclick="playPopAndNavigate('/')">
          <img src="/mee/logo.svg" alt="StoryMee Logo" class="logo-image">
        </div>
      </div>
      <div class="universe-header-right">
        <button class="universe-signup-btn" onclick="playPopAndNavigate('/login')">Đăng Nhập</button>
      </div>
    </header>

    <!-- Floating Back Button -->
    <div class="back-btn-container"
      style="position: absolute; left: 38px; top: 131px; z-index: 1000; transform: scale(1.1); transform-origin: left top;">
      <button onclick="playPopAndNavigate('/art/')" style="
        background: linear-gradient(135deg, #ff9eb5, #ff7597);
        border: none;
        border-radius: 9999px;
        color: white;
        font-family: 'Mali', sans-serif;
        font-weight: 700;
        font-size: 1rem;
        padding: 10px 25px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        box-shadow: 0 4px 12px rgba(255, 117, 151, 0.3);
        transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      ">
        <i class="fa-solid fa-house"></i>
        <span>Trở Về</span>
      </button>
    </div>

    <!-- Center Content: 2-Column Options -->
    <div class="lobby-cards-container">
      
      <!-- Left Card: Tạo Truyện Mới -->
      <div class="lobby-card-item" onclick="openCreateTypeModal()">
        <div class="lobby-card-content">
          <i class="fa-solid fa-circle-plus lobby-card-icon"></i>
          <div class="lobby-card-title">Tạo Truyện Mới</div>
        </div>
      </div>

      <!-- Right Card: Kho Truyện -->
      <div class="lobby-card-item" onclick="playPopAndNavigate('/art/story/library')">
        <div class="lobby-card-content">
          <i class="fa-solid fa-book lobby-card-icon"></i>
          <div class="lobby-card-title">Kho Truyện</div>
        </div>
      </div>

    </div>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="toast-message"></div>

  <!-- Create Type Modal -->
  <div id="create-type-modal" class="create-modal-overlay">
    <div class="create-modal-card">
      <div class="create-modal-header">
        <div class="create-modal-title">
          <i class="fa-solid fa-wand-magic-sparkles" style="color: #FF5E97;"></i>
          <span>Bạn muốn tạo gì?</span>
        </div>
        <button class="create-modal-close-btn" onclick="closeCreateTypeModal()">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
      <div class="create-options-container">
        <!-- Plot Option -->
        <div class="create-option-card" onclick="playPopAndNavigate('/art/story/genre')">
          <div class="create-option-icon" style="background: linear-gradient(135deg, #F59E0B, #D97706);">
            <i class="fa-solid fa-book-open"></i>
          </div>
          <div class="create-option-info">
            <h4 class="create-option-name">Cốt truyện</h4>
            <p class="create-option-desc">Tạo bộ khung ý tưởng và nhân vật cho câu chuyện mới.</p>
          </div>
        </div>
        
        <!-- Text Story Option -->
        <div class="create-option-card" id="option-text-story" onclick="handleOptionClick('text')">
          <div class="create-option-icon" style="background: linear-gradient(135deg, #3B82F6, #2563EB);">
            <i class="fa-solid fa-file-lines"></i>
          </div>
          <div class="create-option-info">
            <h4 class="create-option-name">Truyện chữ</h4>
            <p class="create-option-desc">Viết chi tiết câu chuyện từ cốt truyện đã có.</p>
          </div>
          <i class="fa-solid fa-lock lock-icon-badge" id="lock-icon-text"></i>
        </div>
        
        <!-- Comic Option -->
        <div class="create-option-card" id="option-comic" onclick="handleOptionClick('comic')">
          <div class="create-option-icon" style="background: linear-gradient(135deg, #10B981, #059669);">
            <i class="fa-solid fa-images"></i>
          </div>
          <div class="create-option-info">
            <h4 class="create-option-name">Truyện tranh</h4>
            <p class="create-option-desc">Tạo truyện tranh với hình ảnh sinh động từ cốt truyện.</p>
          </div>
          <i class="fa-solid fa-lock lock-icon-badge" id="lock-icon-comic"></i>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Bubble pop sound using Web Audio API
    function playPopSound() {
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(150, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.12);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.12);
      } catch (e) {
        console.warn("Audio Context blocked: ", e);
      }
    }

    function playPopAndNavigate(url) {
      playPopSound();
      const loader = document.getElementById('page-loader-overlay');
      if (loader) {
        loader.style.display = 'flex';
        loader.offsetHeight;
        loader.style.opacity = '1';
      }
      setTimeout(() => {
        window.location.href = url;
      }, 350);
    }

    function showComingSoon(featureName) {
      playPopSound();
      const toast = document.getElementById('toast');
      toast.innerText = `${featureName}`;
      if (!toast.innerText.includes('Tính năng')) {
         toast.innerText = `${featureName} - Tính năng đang được phát triển!`;
      }
      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
      }, 2500);
    }

    function openCreateTypeModal() {
      playPopSound();
      const modal = document.getElementById('create-type-modal');
      const optionText = document.getElementById('option-text-story');
      const optionComic = document.getElementById('option-comic');
      const lockText = document.getElementById('lock-icon-text');
      const lockComic = document.getElementById('lock-icon-comic');

      // Check if user has at least 1 saved plot
      let hasPlots = false;
      try {
        const savedPlots = localStorage.getItem('storymee_saved_plots');
        if (savedPlots) {
          const parsed = JSON.parse(savedPlots);
          if (Array.isArray(parsed) && parsed.length > 0) {
            hasPlots = true;
          }
        }
      } catch(e) {}

      if (hasPlots) {
        optionText.classList.remove('locked');
        optionComic.classList.remove('locked');
        lockText.style.display = 'none';
        lockComic.style.display = 'none';
      } else {
        optionText.classList.add('locked');
        optionComic.classList.add('locked');
        lockText.style.display = 'block';
        lockComic.style.display = 'block';
      }

      modal.classList.add('show');
    }

    function closeCreateTypeModal() {
      playPopSound();
      document.getElementById('create-type-modal').classList.remove('show');
    }

    function handleOptionClick(type) {
      const option = document.getElementById(`option-${type === 'text' ? 'text-story' : 'comic'}`);
      if (option.classList.contains('locked')) {
        playPopSound();
        const toast = document.getElementById('toast');
        toast.innerText = 'Bạn cần có ít nhất 1 cốt truyện trong kho để mở tính năng này!';
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2500);
        return;
      }
      // Navigate to dedicated page
      if (type === 'text') {
        playPopAndNavigate('/art/novel');
      } else {
        playPopAndNavigate('/art/comic');
      }
    }

    let characters = [];
    let selectedCharacterId = null;

    function initCharacterSelection() {
      const defaultSeeds = [
        {
          id: 'seed-yuu',
          name: 'Yuu',
          species: 'Gấu trúc',
          age: '12',
          gender: 'Nam',
          avatar: '/mee/PNG/storage-test-yuu-profile.png'
        },
        {
          id: 'seed-nori',
          name: 'Nori',
          species: 'Thỏ con',
          age: '8',
          gender: 'Nữ',
          avatar: '/mee/PNG/storage-test-nori-profile.png'
        },
        {
          id: 'seed-bong',
          name: 'Bông',
          species: 'Cừu nhỏ',
          age: '6',
          gender: 'Nữ',
          avatar: '/mee/PNG/storage-test-bông.jpeg'
        }
      ];

      const saved = localStorage.getItem('storymee_saved_characters');
      if (saved) {
        try {
          characters = JSON.parse(saved);
        } catch(e) {
          characters = defaultSeeds;
        }
      } else {
        characters = defaultSeeds;
      }

      if (!characters || characters.length === 0) {
        characters = defaultSeeds;
      }

      renderCharacterGrid();
    }

    function renderCharacterGrid() {
      const grid = document.getElementById('character-grid');
      if (!grid) return;

      grid.innerHTML = '';
      characters.forEach(char => {
        const isSelected = char.id === selectedCharacterId;
        const card = document.createElement('div');
        card.className = `character-card${isSelected ? ' selected' : ''}`;
        card.onclick = () => selectCharacter(char.id);
        card.style = `
          background: #fffffe;
          border: 3px dashed ${isSelected ? '#ff7597' : '#EBDCD0'};
          border-radius: 24px;
          padding: 15px;
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 12px;
          cursor: pointer;
          transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
          box-shadow: 0 4px 10px rgba(0,0,0,0.02);
          user-select: none;
          position: relative;
          background: ${isSelected ? '#FFF5F7' : '#fffffe'};
          transform: ${isSelected ? 'scale(1.03)' : 'scale(1)'};
        `;

        card.onmouseover = () => {
          if (char.id !== selectedCharacterId) {
            card.style.transform = 'scale(1.05)';
            card.style.borderColor = '#ff9eb5';
            card.style.boxShadow = '0 8px 20px rgba(138, 116, 99, 0.08)';
          }
        };
        card.onmouseout = () => {
          if (char.id !== selectedCharacterId) {
            card.style.transform = 'scale(1)';
            card.style.borderColor = '#EBDCD0';
            card.style.boxShadow = '0 4px 10px rgba(0,0,0,0.02)';
          }
        };

        card.innerHTML = `
          <!-- Checkmark Badge -->
          <div style="
            position: absolute;
            top: 12px;
            right: 12px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff7597, #ff9eb5);
            color: white;
            display: ${isSelected ? 'flex' : 'none'};
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            box-shadow: 0 2px 5px rgba(255,117,151,0.3);
          ">
            <i class="fa-solid fa-check"></i>
          </div>

          <!-- Avatar -->
          <div style="
            width: 90px;
            height: 90px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid #EBDCD0;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            background: #FFFFFF;
          ">
            <img src="${char.avatar || '/mee/PNG/storage-test-yuu-profile.png'}" style="width: 100%; height: 100%; object-fit: cover;">
          </div>

          <!-- Name & Details -->
          <div style="text-align: center;">
            <h3 style="font-family: 'Mali', sans-serif; font-size: 1.25rem; font-weight: 700; color: #5c4e4d; margin: 0 0 4px 0;">${char.name}</h3>
            <span style="font-family: 'Mali', sans-serif; font-size: 0.9rem; font-weight: 600; color: #A99586;">${char.species || 'Bé tự tạo'} • ${char.age} tuổi</span>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    function selectCharacter(id) {
      playPopSound();
      selectedCharacterId = id;
      renderCharacterGrid();
    }

    function confirmCharacterSelection() {
      if (!selectedCharacterId) {
        showComingSoon('Cảnh báo: Vui lòng chọn một nhân vật!');
        return;
      }
      const selectedChar = characters.find(c => c.id === selectedCharacterId);
      playPopSound();
      showComingSoon(`Đang khởi tạo truyện tranh với ${selectedChar.name}...`);
    }

    window.addEventListener('DOMContentLoaded', initCharacterSelection);

    function adjustScale() {
      const wrapper = document.querySelector('.scaler-wrapper');
      if (!wrapper) return;
      
      const targetWidth = 1927.63;
      const targetHeight = 930;
      const winWidth = window.innerWidth;
      const winHeight = window.innerHeight;
      
      const scale = Math.min(winWidth / targetWidth, winHeight / targetHeight);
      wrapper.style.transform = `translateX(-50%) scale(${scale})`;
    }

    window.addEventListener('resize', adjustScale);
    adjustScale();

    let pageLoaded = false;
    function hidePageLoader() {
      if (pageLoaded) return;
      pageLoaded = true;
      adjustScale();
      const loader = document.getElementById('page-loader-overlay');
      if (!loader) return;
      setTimeout(() => {
        loader.style.opacity = '0';
        setTimeout(() => {
          loader.style.display = 'none';
        }, 400);
      }, 150);
    }

    window.addEventListener('load', hidePageLoader);
    setTimeout(hidePageLoader, 500); // Fallback: hide loader after 500ms
    window.addEventListener('pageshow', (e) => {
      if (e.persisted) {
        pageLoaded = false;
        hidePageLoader();
      }
    });
  </script>
  <script src="/aikid-nav-bridge.js"></script>
</body>
</html>
