<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng Nhập - AIkid</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bowlby+One&family=Bowlby+One+SC&family=Fredoka:wght@300..700&family=Inter:wght@800;900&family=Mali:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Chiron+GoRound+TC:wght@900&display=swap" rel="stylesheet">
  
  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body, html {
      width: 100%;
      height: 100%;
      background: url('assets/images/bg-login.jpeg') no-repeat center center;
      background-size: cover;
      font-family: 'Mali', sans-serif;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: flex-end; /* Align the cat to the bottom */
    }

    /* Container for the cat */
    .login-container {
      width: 100%;
      max-width: 1260px;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      bottom: 0px; /* Align white body bottom with screen bottom to show paws fully */
    }

    /* Hide the orange tongue shape drawn in the SVG */
    #svg-tongue {
      display: none !important;
    }

    /* Styling for the new login button overlay */
    .login-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 12px 30px rgba(255, 117, 151, 0.5) !important;
      background: linear-gradient(135deg, #ff5780, #ff7597) !important;
    }

    /* Success Toast */
    .success-toast {
      position: fixed;
      top: -100px;
      left: 50%;
      transform: translateX(-50%);
      background: #4ADE80;
      color: #FFFFFF;
      padding: 16px 32px;
      border-radius: 9999px;
      font-weight: 700;
      font-size: 1.15rem;
      box-shadow: 0 10px 25px rgba(74, 222, 128, 0.35);
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 99999;
      transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .success-toast.show {
      top: 40px;
    }

    /* Placeholder customization */
    input::placeholder {
      color: #A99586;
      opacity: 1;
    }

    /* Chewing & Swallowing animations */
    .swallowed {
      pointer-events: none !important;
      animation: swallowDown 0.6s cubic-bezier(0.6, -0.28, 0.735, 0.045) forwards !important;
    }
    @keyframes swallowDown {
      0% {
        transform: scale(1) translateY(0);
        opacity: 1;
      }
      50% {
        transform: scale(0.6) translateY(50px) rotate(-3deg);
        opacity: 0.5;
      }
      100% {
        transform: scale(0) translateY(160px) rotate(-6deg);
        opacity: 0;
      }
    }
    @keyframes chew {
      0% { transform: translateY(0); }
      20% { transform: translateY(6px) scaleY(0.9); }
      40% { transform: translateY(0); }
      60% { transform: translateY(6px) scaleY(0.9); }
      80% { transform: translateY(0); }
      100% { transform: translateY(0); }
    }
    .chewing {
      animation: chew 0.5s ease-in-out infinite;
    }

    /* Reset autofill styles and keep borders rounded */
    input:-webkit-autofill,
    input:-webkit-autofill:hover, 
    input:-webkit-autofill:focus, 
    input:-webkit-autofill:active {
      -webkit-box-shadow: 0 0 0 1000px #fffffe inset !important;
      -webkit-text-fill-color: #4A3D3C !important;
      font-family: 'Mali', sans-serif !important;
      font-weight: 500 !important;
      font-size: 1.5rem !important;
    }

    /* Global Meteor Loading Overlay CSS */
    #page-loader-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: linear-gradient(135deg, #FF6B6B 0%, #FF8E53 55%, #FCE082 100%);
      background-image: 
        radial-gradient(rgba(255,255,255,0.4), rgba(255,255,255,0.1) 2px, transparent 40px),
        radial-gradient(rgba(255,255,255,0.3), rgba(255,255,255,0.05) 1px, transparent 30px),
        linear-gradient(135deg, #FF6B6B 0%, #FF8E53 55%, #FCE082 100%);
      background-size: 550px 550px, 350px 350px, 100% 100%;
      background-position: 0 0, 40px 60px, 0 0;
      z-index: 999999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 1;
      transition: opacity 0.4s ease;
      pointer-events: all;
      overflow: hidden;
    }
    @keyframes meteorFlight {
      0% {
        transform: translate(60vw, -60vh) rotate(150deg);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      90% {
        opacity: 1;
      }
      100% {
        transform: translate(-60vw, 60vh) rotate(150deg);
        opacity: 0;
      }
    }
    @keyframes miniFlight {
      0% {
        transform: translate(60vw, -60vh) rotate(150deg);
        opacity: 0;
      }
      15% { opacity: 0.6; }
      85% { opacity: 0.6; }
      100% {
        transform: translate(-60vw, 60vh) rotate(150deg);
        opacity: 0;
      }
    }
    @keyframes loadingDots {
      0%, 20% { content: "."; }
      40% { content: ".."; }
      60%, 100% { content: "..."; }
    }
    .loading-dots::after {
      content: "";
      animation: loadingDots 1.5s infinite steps(1);
      display: inline-block;
      width: 24px;
      text-align: left;
    }
    .meteor-container {
      position: relative;
      width: 320px;
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      animation: meteorFlight 2.2s cubic-bezier(0.25, 0.8, 0.25, 1) infinite;
      z-index: 10;
    }
    .meteor-head {
      width: 80px;
      height: 80px;
      background: radial-gradient(circle at 35% 35%, #FFF0F5 0%, #FFB6C1 25%, #FF5E97 60%, #9D1C7F 100%);
      border-radius: 50%;
      box-shadow: 
        0 0 25px rgba(255, 94, 151, 0.9),
        0 0 60px rgba(157, 28, 127, 0.6),
        0 0 120px rgba(157, 28, 127, 0.4);
      position: relative;
      flex-shrink: 0;
    }
    .meteor-crater {
      position: absolute;
      background: rgba(0, 0, 0, 0.08);
      border-radius: 50%;
      box-shadow: inset 1px 1px 2px rgba(0,0,0,0.15);
    }
    .meteor-crater-1 { width: 14px; height: 14px; top: 22px; left: 18px; }
    .meteor-crater-2 { width: 20px; height: 20px; top: 32px; left: 32px; }
    .meteor-crater-3 { width: 12px; height: 12px; top: 18px; left: 45px; }
    .meteor-crater-4 { width: 10px; height: 10px; top: 48px; left: 20px; }
    
    .meteor-trail {
      width: 600px;
      height: 70px;
      background: linear-gradient(to right, rgba(157, 28, 127, 0) 0%, rgba(157, 28, 127, 0.25) 35%, rgba(255, 94, 151, 0.75) 75%, rgba(255, 240, 245, 0.95) 100%);
      border-radius: 40px 0 0 40px;
      margin-right: -40px;
      filter: blur(2px);
    }
    .mini-meteor {
      position: absolute;
      width: 160px;
      height: 5px;
      background: linear-gradient(to right, rgba(255, 182, 193, 0) 0%, rgba(255, 255, 255, 0.9) 100%);
      border-radius: 9999px;
      opacity: 0;
      filter: blur(1.5px);
      transform: rotate(150deg);
    }
    .mini-1 {
      top: 25%;
      left: 15%;
      animation: miniFlight 1.6s linear infinite;
      animation-delay: 0.4s;
    }
    .mini-2 {
      top: 75%;
      left: 5%;
      animation: miniFlight 1.9s linear infinite;
      animation-delay: 0.9s;
    }
    .mini-3 {
      top: 85%;
      left: 50%;
      animation: miniFlight 1.4s linear infinite;
      animation-delay: 0.1s;
    }

    /* Custom high-fidelity rounded Vietnamese letter đ */
    .custom-đ {
      position: relative;
      display: inline-block;
      font-family: 'Chiron GoRound TC', sans-serif !important;
    }
    .custom-đ::after {
      content: "";
      position: absolute;
      width: 0.46em;
      height: 0.12em;
      background: currentColor;
      border-radius: 9999px;
      top: 0.32em;
      left: 0.27em;
    }
  </style>
</head>

    <div class="meteor-container">

      align-items: center;

  <script>
    // Handle form submit
    function handleLogin(event) {
      event.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      if (email && password) {
        // Prevent double form submission
        document.body.style.pointerEvents = 'none';

        // 1. Play swallow sound (pop)
        try {
          const audio = new Audio('/assets/audio/pop.mp3');
          audio.volume = 0.5;
          audio.play();
        } catch(e) {}

        // 2. Swallow the input card, forgot password link, register link and the login button itself
        document.getElementById('inputs-card').classList.add('swallowed');
        document.getElementById('forgot-link').classList.add('swallowed');
        document.getElementById('register-link').classList.add('swallowed');
        const loginBtn = document.querySelector('.login-btn');
        if (loginBtn) {
          loginBtn.classList.add('swallowed');
        }

        // 3. Just as the card gets swallowed (0.4s), switch mouth to closed/eating and start chewing!
        setTimeout(() => {
          // Hide original mouth elements
          const elementsToHide = [
            'svg-nose',
            'svg-mouth',
            'svg-tongue',
            'svg-tooth-left',
            'svg-tooth-right',
            'svg-input-bg-card',
            'svg-input-bg-line'
          ];
          elementsToHide.forEach(id => {
            const el = document.getElementById(id);
            if (el) el.style.display = 'none';
          });

          // Show closed mouth and animate chew
          const chewGroup = document.getElementById('svg-chewing-group');
          if (chewGroup) {
            chewGroup.style.display = 'block';
            chewGroup.classList.add('chewing');
          }

          // Chewing sound effect beats
          setTimeout(() => {
            try {
              const chewAudio = new Audio('/assets/audio/pop.mp3');
              chewAudio.volume = 0.3;
              chewAudio.play();
            } catch(e) {}
          }, 350);
          setTimeout(() => {
            try {
              const chewAudio2 = new Audio('/assets/audio/pop.mp3');
              chewAudio2.volume = 0.3;
              chewAudio2.play();
            } catch(e) {}
          }, 700);
          setTimeout(() => {
            try {
              const chewAudio3 = new Audio('/assets/audio/pop.mp3');
              chewAudio3.volume = 0.3;
              chewAudio3.play();
            } catch(e) {}
          }, 1050);

        }, 400);

        // 4. Redirect to home page after 2.2 seconds (chew for 1.8 seconds)
        setTimeout(() => {
          window.location.href = '/?from=login';
        }, 2200);
      }
    }

    // Toggle password visibility (show/hide)
    function togglePasswordVisibility() {
      const passwordInput = document.getElementById('password');
      const eyeIcon = document.getElementById('password-eye-icon');
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        eyeIcon.className = 'fa-solid fa-eye-slash';
      } else {
        passwordInput.type = 'password';
        eyeIcon.className = 'fa-solid fa-eye';
      }
    }

    function adjustScale() {
      const wrapper = document.querySelector('.scaler-wrapper');
      if (!wrapper) return;
      
      const targetWidth = 1927.63;
      const targetHeight = 930;
      const winWidth = window.innerWidth;
      const winHeight = window.innerHeight;
      
      const scale = Math.min(winWidth / targetWidth, winHeight / targetHeight);
      
      wrapper.style.transform = `translateX(-50%) scale(${scale})`;
    }

    window.addEventListener('resize', adjustScale);
    adjustScale();

    let loaderFaded = false;
    let pageLoaded = false;

    function hidePageLoader() {
        if (pageLoaded) return;
        pageLoaded = true;
        
        // Ensure scale is adjusted first
        adjustScale();
        
        const loader = document.getElementById('page-loader-overlay');
        if (!loader) return;

        // Wait 150ms after window load to ensure everything is positioned/scaled smoothly, then fade out
        setTimeout(() => {
            loader.style.opacity = '0';
            setTimeout(() => {
                loader.style.display = 'none';
            }, 400);
        }, 150);
    }

    window.addEventListener('load', hidePageLoader);
    window.addEventListener('pageshow', (e) => {
        if (e.persisted) {
            pageLoaded = false;
            hidePageLoader();
        }
    });

    // Go back
    function goBack() {
      if (document.referrer) {
        window.history.back();
      } else {
        window.location.href = '/';
      }
    }
  </script>
