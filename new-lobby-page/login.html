<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng Nhập - StoryMee</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Mali:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  
  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body, html {
      width: 100%;
      height: 100%;
      background-color: #4ba3e3; /* Sky blue background */
      font-family: 'Mali', sans-serif;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: flex-end; /* Align the cat to the bottom */
    }

    /* Back Button */
    .back-btn {
      position: absolute;
      left: 30px;
      top: 30px;
      background: rgba(255, 255, 255, 0.9);
      border: 3px solid #FFFFFF;
      color: #1E293B;
      padding: 10px 24px;
      font-size: 1.1rem;
      font-weight: 700;
      border-radius: 9999px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
      transition: all 0.2s ease;
      z-index: 100;
    }

    .back-btn:hover {
      transform: translateY(-2px);
      background: #FFFFFF;
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.15);
    }

    /* Container for the cat */
    .login-container {
      width: 100%;
      max-width: 700px;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      bottom: -60px; /* Slight offset to crop the cat body at the bottom */
    }

    /* Cat Body */
    .cat {
      position: relative;
      width: 580px;
      height: 600px;
      background: #FFFFFF; /* White body */
      border-radius: 290px 290px 0 0; /* Dome shape for head/body */
      display: flex;
      flex-direction: column;
      align-items: center;
      box-shadow: 0 -10px 45px rgba(0, 0, 0, 0.06);
    }

    /* Cat Ears */
    .ear {
      position: absolute;
      top: -35px;
      width: 115px;
      height: 115px;
      z-index: -1;
    }

    .ear.left {
      left: 35px;
      background: #FFFFFF;
      border-radius: 20px 90px 0 0;
      transform: rotate(-12deg);
    }

    .ear.left .ear-inner {
      position: absolute;
      top: 18px;
      left: 18px;
      width: 75px;
      height: 75px;
      background: #f06100; /* Orange inner ear */
      border-radius: 10px 65px 0 0;
    }

    .ear.right {
      right: 35px;
      background: #f08b18; /* Orange outer ear */
      border-radius: 90px 20px 0 0;
      transform: rotate(12deg);
    }

    .ear.right .ear-inner {
      position: absolute;
      top: 18px;
      right: 18px;
      width: 75px;
      height: 75px;
      background: #f06100;
      border-radius: 65px 10px 0 0;
    }

    /* Cat spots (Orange patch over the right eye/ear) */
    .cat-spot {
      position: absolute;
      top: 0;
      right: 0;
      width: 250px;
      height: 250px;
      background: #f08b18; /* Vàng cam */
      border-radius: 0 290px 0 100%;
      z-index: 1;
    }

    /* Happy Happy Curved Eyes (^) */
    .eyes-container {
      display: flex;
      justify-content: space-between;
      width: 320px;
      position: absolute;
      top: 135px;
      z-index: 3;
    }

    .eye-happy {
      width: 48px;
      height: 24px;
      border: 5px solid #d64900; /* Dark orange eye line */
      border-bottom: none;
      border-left: none;
      border-right: none;
      border-radius: 40px 40px 0 0 / 40px 40px 0 0; /* Curve up */
    }

    /* Nose */
    .cat-nose {
      position: absolute;
      top: 182px;
      left: 50%;
      transform: translateX(-50%);
      width: 26px;
      height: 16px;
      background: #d64900;
      clip-path: polygon(0 0, 100% 0, 50% 100%);
      z-index: 3;
    }

    .cat-nose::after {
      content: "";
      position: absolute;
      top: 15px;
      left: 11px;
      width: 4px;
      height: 18px;
      background: #d64900;
    }

    /* Big Mouth eating the card */
    .cat-mouth {
      position: absolute;
      top: 215px;
      left: 50%;
      transform: translateX(-50%);
      width: 380px;
      height: 220px;
      background: #e64a19; /* Big dark orange/red mouth */
      border-radius: 50% 50% 46% 46%;
      overflow: hidden;
      z-index: 2;
      box-shadow: inset 0 10px 20px rgba(0,0,0,0.15);
    }

    /* Fangs */
    .fang {
      position: absolute;
      top: -2px;
      width: 22px;
      height: 25px;
      background: #FFFFFF;
      clip-path: polygon(0 0, 100% 0, 50% 100%);
    }

    .fang.left {
      left: 80px;
    }

    .fang.right {
      right: 80px;
    }

    /* Tongue */
    .cat-tongue {
      position: absolute;
      bottom: -15px;
      left: 50%;
      transform: translateX(-50%);
      width: 170px;
      height: 85px;
      background: #b71c1c; /* Tongue red */
      border-radius: 85px 85px 0 0;
    }

    .cat-throat {
      position: absolute;
      top: 25px;
      left: 50%;
      transform: translateX(-50%);
      width: 70px;
      height: 40px;
      background: #880e4f;
      border-radius: 50%;
      opacity: 0.45;
    }

    /* Login Form Wrapper overlapping the mouth */
    .login-form-wrapper {
      position: relative;
      margin-top: 255px; /* Overlap mouth precisely */
      width: 326px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* White login card with thin border */
    .login-card {
      width: 100%;
      background: #FFFFFF;
      border: 2px solid #E2E8F0;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
    }

    .input-group {
      width: 100%;
      position: relative;
    }

    .input-group input {
      width: 100%;
      height: 60px;
      border: none;
      outline: none;
      padding: 0 24px;
      font-family: 'Mali', sans-serif;
      font-size: 1.25rem;
      font-weight: 500;
      color: #2D3748;
      background: #FFFFFF;
    }

    /* Input placeholders */
    .input-group input::placeholder {
      color: #A0AEC0;
      opacity: 1;
    }

    /* Grey divider */
    .input-divider {
      width: 100%;
      height: 2px;
      background: #EDF2F7;
    }

    /* Submit Button Area */
    .submit-area {
      position: relative;
      margin-top: -15px; /* Overlap card bottom */
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    /* Cat Arms holding the button */
    .hand {
      position: absolute;
      width: 110px;
      height: 52px;
      background: #f08b18; /* Orange arms */
      z-index: 15;
      top: 50%;
      transform: translateY(-50%);
    }

    .hand.left {
      left: -50px;
      border-radius: 0 26px 26px 0;
    }

    .hand.right {
      right: -50px;
      border-radius: 26px 0 0 26px;
    }

    /* Custom go/Đăng Nhập button */
    .login-btn {
      min-width: 200px;
      height: 58px;
      background: #e64a19; /* Solid red orange button */
      border: none;
      border-radius: 18px;
      color: #FFFFFF;
      font-family: 'Mali', sans-serif;
      font-weight: 700;
      font-size: 1.45rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 35px;
      box-shadow: 0 6px 15px rgba(230, 74, 25, 0.25);
      transition: all 0.2s ease;
      z-index: 12;
    }

    .login-btn:hover {
      background: #d84315;
      transform: scale(1.02);
      box-shadow: 0 8px 20px rgba(230, 74, 25, 0.35);
    }

    .login-btn:active {
      transform: scale(0.98);
    }

    /* Success toast styling */
    .success-toast {
      position: fixed;
      top: -100px;
      left: 50%;
      transform: translateX(-50%);
      background: #38A169;
      color: #FFFFFF;
      padding: 16px 36px;
      border-radius: 20px;
      font-size: 1.25rem;
      font-weight: 700;
      box-shadow: 0 10px 25px rgba(56, 161, 105, 0.35);
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .success-toast.show {
      top: 40px;
    }
  </style>
</head>
<body>

  <!-- Back to Lobby Button -->
  <button class="back-btn" onclick="goBack()">
    <i class="fa-solid fa-arrow-left"></i> Quay Lại
  </button>

  <!-- Success Toast -->
  <div id="success-toast" class="success-toast">
    <i class="fa-solid fa-circle-check"></i> Đăng nhập thành công! Đang vào đảo...
  </div>

  <div class="login-container">
    <form class="cat" onsubmit="handleLogin(event)">
      <!-- Left & Right Ears -->
      <div class="ear left">
        <div class="ear-inner"></div>
      </div>
      <div class="ear right">
        <div class="ear-inner"></div>
      </div>
      
      <!-- Right eye/ear orange patch -->
      <div class="cat-spot"></div>

      <!-- Happy Happy Curved Eyes (^) -->
      <div class="eyes-container">
        <div class="eye-happy left"></div>
        <div class="eye-happy right"></div>
      </div>

      <!-- Nose & Mouth attachment -->
      <div class="cat-nose"></div>

      <!-- Big mouth behind card -->
      <div class="cat-mouth">
        <!-- Throat depth -->
        <div class="cat-throat"></div>
        <!-- Fangs -->
        <div class="fang left"></div>
        <div class="fang right"></div>
        <!-- Tongue -->
        <div class="cat-tongue"></div>
      </div>

      <!-- Login Card -->
      <div class="login-form-wrapper">
        <div class="login-card">
          <div class="input-group">
            <input type="email" id="email" placeholder="Email" required autocomplete="email">
          </div>
          <div class="input-divider"></div>
          <div class="input-group">
            <input type="password" id="password" placeholder="Mật khẩu" required autocomplete="current-password">
          </div>
        </div>

        <!-- Submit Button held by cat arms -->
        <div class="submit-area">
          <div class="hand left"></div>
          <button type="submit" class="login-btn">đăng nhập</button>
          <div class="hand right"></div>
        </div>
      </div>
    </form>
  </div>

  <script>
    // Handle form submit
    function handleLogin(event) {
      event.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      if (email && password) {
        // Show success alert
        const toast = document.getElementById('success-toast');
        toast.classList.add('show');
        
        // Play pop sound
        try {
          const audio = new Audio('/assets/audio/pop.mp3');
          audio.volume = 0.5;
          audio.play();
        } catch(e) {}

        // Redirect back to lobby after 1.5s
        setTimeout(() => {
          window.location.href = '/';
        }, 1500);
      }
    }

    // Go back
    function goBack() {
      if (document.referrer) {
        window.history.back();
      } else {
        window.location.href = '/';
      }
    }
  </script>
</body>
</html>
