<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng Nhập - StoryMee</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Mali:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  
  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body, html {
      width: 100%;
      height: 100%;
      background: url('assets/images/bg-login.jpeg') no-repeat center center;
      background-size: cover;
      font-family: 'Mali', sans-serif;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: flex-end; /* Align the cat to the bottom */
    }

    /* Back Button */
    .back-btn {
      position: absolute;
      left: 30px;
      top: 30px;
      background: rgba(255, 255, 255, 0.9);
      border: 3px solid #FFFFFF;
      color: #1E293B;
      padding: 10px 24px;
      font-size: 1.1rem;
      font-weight: 700;
      border-radius: 9999px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
      transition: all 0.2s ease;
      z-index: 100;
    }

    .back-btn:hover {
      transform: translateY(-2px);
      background: #FFFFFF;
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.15);
    }

    /* Container for the cat */
    .login-container {
      width: 100%;
      max-width: 800px;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      bottom: -60px; /* Offset to crop the cat body at the bottom */
    }

    /* Giant Cat Body */
    .cat {
      position: relative;
      width: 720px; /* Expanded width to match reference */
      height: 680px; /* Tall and big */
      background: #FFFFFF; /* White body */
      border-radius: 360px 360px 0 0; /* Huge dome shape for head/body */
      display: flex;
      flex-direction: column;
      align-items: center;
      box-shadow: 0 -10px 45px rgba(0, 0, 0, 0.06);
    }

    /* Cat Ears */
    .ear {
      position: absolute;
      top: -45px;
      width: 140px;
      height: 140px;
      z-index: -1;
    }

    .ear.left {
      left: 50px;
      background: #FFFFFF;
      border-radius: 25px 110px 0 0;
      transform: rotate(-12deg);
    }

    .ear.left .ear-inner {
      position: absolute;
      top: 22px;
      left: 22px;
      width: 90px;
      height: 90px;
      background: #f06100; /* Dark orange inner ear */
      border-radius: 12px 80px 0 0;
    }

    .ear.right {
      right: 50px;
      background: #f08b18; /* Yellow orange outer ear */
      border-radius: 110px 25px 0 0;
      transform: rotate(12deg);
    }

    .ear.right .ear-inner {
      position: absolute;
      top: 22px;
      right: 22px;
      width: 90px;
      height: 90px;
      background: #f06100;
      border-radius: 80px 12px 0 0;
    }

    /* Orange patch over right eye and ear */
    .cat-spot {
      position: absolute;
      top: 0;
      right: 0;
      width: 320px;
      height: 320px;
      background: #f08b18;
      border-radius: 0 360px 0 100%;
      z-index: 1;
    }

    /* Curved Happy Eyes (^) */
    .eyes-container {
      display: flex;
      justify-content: space-between;
      width: 400px;
      position: absolute;
      top: 155px;
      z-index: 3;
    }

    .eye-happy {
      width: 60px;
      height: 30px;
      border: 6.5px solid #d64900; /* Thick dark orange eye stroke */
      border-bottom: none;
      border-left: none;
      border-right: none;
      border-radius: 50px 50px 0 0 / 50px 50px 0 0; /* Arc shape */
    }

    /* Nose */
    .cat-nose {
      position: absolute;
      top: 212px;
      left: 50%;
      transform: translateX(-50%);
      width: 32px;
      height: 20px;
      background: #d64900;
      clip-path: polygon(0 0, 100% 0, 50% 100%);
      z-index: 3;
    }

    .cat-nose::after {
      content: "";
      position: absolute;
      top: 19px;
      left: 14px;
      width: 4.5px;
      height: 24px;
      background: #d64900;
    }

    /* Giant Mouth eating card */
    .cat-mouth {
      position: absolute;
      top: 252px;
      left: 50%;
      transform: translateX(-50%);
      width: 480px; /* Extra large mouth */
      height: 270px;
      background: #e64a19; /* Red-orange inner mouth */
      border-radius: 50% 50% 46% 46%;
      overflow: hidden;
      z-index: 2;
      box-shadow: inset 0 12px 24px rgba(0,0,0,0.18);
    }

    /* Double fangs */
    .fang {
      position: absolute;
      top: -2px;
      width: 26px;
      height: 32px;
      background: #FFFFFF;
      clip-path: polygon(0 0, 100% 0, 50% 100%);
    }

    .fang.left {
      left: 105px;
    }

    .fang.right {
      right: 105px;
    }

    /* Custom Double-Lobe Tongue shape */
    .cat-tongue {
      position: absolute;
      bottom: -15px;
      left: 50%;
      transform: translateX(-50%);
      width: 220px;
      height: 90px;
      display: flex;
      justify-content: center;
      z-index: 1;
    }

    .tongue-lobe {
      width: 125px;
      height: 125px;
      background: #f06100; /* Brighter orange tongue */
      border-radius: 50%;
      margin: 0 -12px;
      box-shadow: inset 0 5px 10px rgba(0,0,0,0.05);
    }

    .cat-throat {
      position: absolute;
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      width: 90px;
      height: 50px;
      background: #880e4f;
      border-radius: 50%;
      opacity: 0.4;
    }

    /* Login Form Wrapper overlapping mouth */
    .login-form-wrapper {
      position: relative;
      margin-top: 310px; /* Shifted down to overlap mouth precisely */
      width: 390px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* White card with thin border */
    .login-card {
      width: 100%;
      background: #FFFFFF;
      border: 2px solid #E2E8F0;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    .input-group {
      width: 100%;
      position: relative;
    }

    .input-group input {
      width: 100%;
      height: 68px;
      border: none;
      outline: none;
      padding: 0 26px;
      font-family: 'Mali', sans-serif;
      font-size: 1.45rem;
      font-weight: 500;
      color: #2D3748;
      background: #FFFFFF;
    }

    .input-group input::placeholder {
      color: #A0AEC0;
      opacity: 1;
    }

    .input-divider {
      width: 100%;
      height: 2px;
      background: #EDF2F7;
    }

    /* Submit Button Area */
    .submit-area {
      position: relative;
      margin-top: -15px;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    /* Cat Arms with detailed rounded fingers holding button */
    .hand {
      position: absolute;
      background: #f08b18; /* Yellow orange arms */
      z-index: 15;
      display: flex;
      align-items: center;
    }

    .hand.left {
      left: -60px;
      width: 200px;
      height: 75px;
      border-radius: 0 35px 35px 0;
      top: 50%;
      transform: translateY(-50%) rotate(12deg);
      transform-origin: left center;
      justify-content: flex-end;
      padding-right: 15px;
    }

    .hand.right {
      right: -60px;
      width: 200px;
      height: 75px;
      border-radius: 35px 0 0 35px;
      top: 50%;
      transform: translateY(-50%) rotate(-12deg);
      transform-origin: right center;
      justify-content: flex-start;
      padding-left: 15px;
    }

    /* Detailed rounded fingers */
    .finger {
      width: 26px;
      height: 26px;
      background: #f08b18;
      border-radius: 50%;
      margin: 0 -2.5px;
      box-shadow: -2px 0 5px rgba(0, 0, 0, 0.05);
    }

    /* Custom go/Đăng Nhập button */
    .login-btn {
      min-width: 250px;
      height: 68px;
      background: #e64a19; /* Solid red orange button */
      border: none;
      border-radius: 18px;
      color: #FFFFFF;
      font-family: 'Mali', sans-serif;
      font-weight: 700;
      font-size: 1.6rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 45px;
      box-shadow: 0 6px 18px rgba(230, 74, 25, 0.25);
      transition: all 0.2s ease;
      z-index: 12;
    }

    .login-btn:hover {
      background: #d84315;
      transform: scale(1.02);
      box-shadow: 0 8px 22px rgba(230, 74, 25, 0.35);
    }

    .login-btn:active {
      transform: scale(0.98);
    }

    /* Success toast styling */
    .success-toast {
      position: fixed;
      top: -100px;
      left: 50%;
      transform: translateX(-50%);
      background: #38A169;
      color: #FFFFFF;
      padding: 16px 36px;
      border-radius: 20px;
      font-size: 1.25rem;
      font-weight: 700;
      box-shadow: 0 10px 25px rgba(56, 161, 105, 0.35);
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .success-toast.show {
      top: 40px;
    }
  </style>
</head>
<body>

  <!-- Back to Lobby Button -->
  <button class="back-btn" onclick="goBack()">
    <i class="fa-solid fa-arrow-left"></i> Quay Lại
  </button>

  <!-- Success Toast -->
  <div id="success-toast" class="success-toast">
    <i class="fa-solid fa-circle-check"></i> Đăng nhập thành công! Đang vào đảo...
  </div>

  <div class="login-container">
    <form class="cat" onsubmit="handleLogin(event)">
      <!-- Left & Right Ears -->
      <div class="ear left">
        <div class="ear-inner"></div>
      </div>
      <div class="ear right">
        <div class="ear-inner"></div>
      </div>
      
      <!-- Right eye/ear orange patch -->
      <div class="cat-spot"></div>

      <!-- Happy Happy Curved Eyes (^) -->
      <div class="eyes-container">
        <div class="eye-happy left"></div>
        <div class="eye-happy right"></div>
      </div>

      <!-- Nose & Mouth attachment -->
      <div class="cat-nose"></div>

      <!-- Big mouth behind card -->
      <div class="cat-mouth">
        <!-- Throat depth -->
        <div class="cat-throat"></div>
        <!-- Fangs -->
        <div class="fang left"></div>
        <div class="fang right"></div>
        <!-- Tongue with double-lobe -->
        <div class="cat-tongue">
          <div class="tongue-lobe"></div>
          <div class="tongue-lobe"></div>
        </div>
      </div>

      <!-- Login Card -->
      <div class="login-form-wrapper">
        <div class="login-card">
          <div class="input-group">
            <input type="email" id="email" placeholder="Email" required autocomplete="email">
          </div>
          <div class="input-divider"></div>
          <div class="input-group">
            <input type="password" id="password" placeholder="Mật khẩu" required autocomplete="current-password">
          </div>
        </div>

        <!-- Submit Button held by cat arms with fingers -->
        <div class="submit-area">
          <!-- Left hand with 3 fingers -->
          <div class="hand left">
            <div class="finger"></div>
            <div class="finger"></div>
            <div class="finger"></div>
          </div>
          <button type="submit" class="login-btn">đăng nhập</button>
          <!-- Right hand with 3 fingers -->
          <div class="hand right">
            <div class="finger"></div>
            <div class="finger"></div>
            <div class="finger"></div>
          </div>
        </div>
      </div>
    </form>
  </div>

  <script>
    // Handle form submit
    function handleLogin(event) {
      event.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      if (email && password) {
        // Show success alert
        const toast = document.getElementById('success-toast');
        toast.classList.add('show');
        
        // Play pop sound
        try {
          const audio = new Audio('/assets/audio/pop.mp3');
          audio.volume = 0.5;
          audio.play();
        } catch(e) {}

        // Redirect back to lobby after 1.5s
        setTimeout(() => {
          window.location.href = '/';
        }, 1500);
      }
    }

    // Go back
    function goBack() {
      if (document.referrer) {
        window.history.back();
      } else {
        window.location.href = '/';
      }
    }
  </script>
</body>
</html>
