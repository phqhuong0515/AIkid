<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng Ký - AIkid</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Bowlby+One&family=Bowlby+One+SC&family=Fredoka:wght@300..700&family=Inter:wght@800;900&family=Mali:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Chiron+GoRound+TC:wght@900&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body,
    html {
      width: 100%;
      height: 100%;
      background: url('assets/images/bg-login.jpeg') no-repeat center center;
      background-size: cover;
      font-family: 'Mali', sans-serif;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      /* Align the cat to the bottom */
    }

    /* Container for the cat */
    .login-container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      bottom: 0px; /* Align white body bottom with screen bottom to show paws fully */
    }

    /* Hide the orange tongue shape drawn in the SVG */
    #svg-tongue {
      display: none !important;
    }

    /* Styling for the new login button overlay */
    .login-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 12px 30px rgba(255, 117, 151, 0.5) !important;
      background: linear-gradient(135deg, #ff5780, #ff7597) !important;
    }

    /* Success Toast */
    .success-toast {
      position: fixed;
      top: -100px;
      left: 50%;
      transform: translateX(-50%);
      background: #4ADE80;
      color: #FFFFFF;
      padding: 16px 32px;
      border-radius: 9999px;
      font-weight: 700;
      font-size: 1.15rem;
      box-shadow: 0 10px 25px rgba(74, 222, 128, 0.35);
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 99999;
      transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .success-toast.show {
      top: 40px;
    }

    /* Placeholder customization */
    input::placeholder {
      color: #A99586;
      opacity: 1;
    }

    /* Chewing & Swallowing animations */
    .swallowed {
      pointer-events: none !important;
      animation: swallowDown 0.6s cubic-bezier(0.6, -0.28, 0.735, 0.045) forwards !important;
    }

    @keyframes swallowDown {
      0% {
        transform: scale(1) translateY(0);
        opacity: 1;
      }

      50% {
        transform: scale(0.6) translateY(50px) rotate(-3deg);
        opacity: 0.5;
      }

      100% {
        transform: scale(0) translateY(160px) rotate(-6deg);
        opacity: 0;
      }
    }

    @keyframes chew {
      0% {
        transform: translateY(0);
      }

      20% {
        transform: translateY(6px) scaleY(0.9);
      }

      40% {
        transform: translateY(0);
      }

      60% {
        transform: translateY(6px) scaleY(0.9);
      }

      80% {
        transform: translateY(0);
      }

      100% {
        transform: translateY(0);
      }
    }

    .chewing {
      animation: chew 0.5s ease-in-out infinite;
    }

    /* Reset autofill styles and keep borders rounded */
    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus,
    input:-webkit-autofill:active {
      -webkit-box-shadow: 0 0 0 1000px #fffffe inset !important;
      -webkit-text-fill-color: #4A3D3C !important;
      font-family: 'Mali', sans-serif !important;
      font-weight: 500 !important;
      font-size: 1.0rem !important;
    }

    /* Global Meteor Loading Overlay CSS */
    #page-loader-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: linear-gradient(135deg, #FF6B6B 0%, #FF8E53 55%, #FCE082 100%);
      background-image:
        radial-gradient(rgba(255, 255, 255, 0.4), rgba(255, 255, 255, 0.1) 2px, transparent 40px),
        radial-gradient(rgba(255, 255, 255, 0.3), rgba(255, 255, 255, 0.05) 1px, transparent 30px),
        linear-gradient(135deg, #FF6B6B 0%, #FF8E53 55%, #FCE082 100%);
      background-size: 550px 550px, 350px 350px, 100% 100%;
      background-position: 0 0, 40px 60px, 0 0;
      z-index: 999999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 1;
      transition: opacity 0.4s ease;
      pointer-events: all;
      overflow: hidden;
    }

    @keyframes meteorFlight {
      0% {
        transform: translate(60vw, -60vh) rotate(150deg);
        opacity: 0;
      }

      10% {
        opacity: 1;
      }

      90% {
        opacity: 1;
      }

      100% {
        transform: translate(-60vw, 60vh) rotate(150deg);
        opacity: 0;
      }
    }

    @keyframes miniFlight {
      0% {
        transform: translate(60vw, -60vh) rotate(150deg);
        opacity: 0;
      }

      15% {
        opacity: 0.6;
      }

      85% {
        opacity: 0.6;
      }

      100% {
        transform: translate(-60vw, 60vh) rotate(150deg);
        opacity: 0;
      }
    }

    @keyframes loadingDots {

      0%,
      20% {
        content: ".";
      }

      40% {
        content: "..";
      }

      60%,
      100% {
        content: "...";
      }
    }

    .loading-dots::after {
      content: "";
      animation: loadingDots 1.5s infinite steps(1);
      display: inline-block;
      width: 24px;
      text-align: left;
    }

    .meteor-container {
      position: relative;
      width: 320px;
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      animation: meteorFlight 2.2s cubic-bezier(0.25, 0.8, 0.25, 1) infinite;
      z-index: 10;
    }

    .meteor-head {
      width: 80px;
      height: 80px;
      background: radial-gradient(circle at 35% 35%, #FFF0F5 0%, #FFB6C1 25%, #FF5E97 60%, #9D1C7F 100%);
      border-radius: 50%;
      box-shadow:
        0 0 25px rgba(255, 94, 151, 0.9),
        0 0 60px rgba(157, 28, 127, 0.6),
        0 0 120px rgba(157, 28, 127, 0.4);
      position: relative;
      flex-shrink: 0;
    }

    .meteor-crater {
      position: absolute;
      background: rgba(0, 0, 0, 0.08);
      border-radius: 50%;
      box-shadow: inset 1px 1px 2px rgba(0, 0, 0, 0.15);
    }

    .meteor-crater-1 {
      width: 14px;
      height: 14px;
      top: 22px;
      left: 18px;
    }

    .meteor-crater-2 {
      width: 20px;
      height: 20px;
      top: 32px;
      left: 32px;
    }

    .meteor-crater-3 {
      width: 12px;
      height: 12px;
      top: 18px;
      left: 45px;
    }

    .meteor-crater-4 {
      width: 10px;
      height: 10px;
      top: 48px;
      left: 20px;
    }

    .meteor-trail {
      width: 600px;
      height: 70px;
      background: linear-gradient(to right, rgba(157, 28, 127, 0) 0%, rgba(157, 28, 127, 0.25) 35%, rgba(255, 94, 151, 0.75) 75%, rgba(255, 240, 245, 0.95) 100%);
      border-radius: 40px 0 0 40px;
      margin-right: -40px;
      filter: blur(2px);
    }

    .mini-meteor {
      position: absolute;
      width: 160px;
      height: 5px;
      background: linear-gradient(to right, rgba(255, 182, 193, 0) 0%, rgba(255, 255, 255, 0.9) 100%);
      border-radius: 9999px;
      opacity: 0;
      filter: blur(1.5px);
      transform: rotate(150deg);
    }

    .mini-1 {
      top: 25%;
      left: 15%;
      animation: miniFlight 1.6s linear infinite;
      animation-delay: 0.4s;
    }

    .mini-2 {
      top: 75%;
      left: 5%;
      animation: miniFlight 1.9s linear infinite;
      animation-delay: 0.9s;
    }

    .mini-3 {
      top: 85%;
      left: 50%;
      animation: miniFlight 1.4s linear infinite;
      animation-delay: 0.1s;
    }

    /* Custom high-fidelity rounded Vietnamese letter đ */
    .custom-đ {
      position: relative;
      display: inline-block;
      font-family: 'Chiron GoRound TC', sans-serif !important;
    }

    .custom-đ::after {
      content: "";
      position: absolute;
      width: 0.46em;
      height: 0.12em;
      background: currentColor;
      border-radius: 9999px;
      top: 0.32em;
      left: 0.27em;
    }
  </style>
</head>

<body>

  <!-- Global Meteor Loading Overlay -->
  <div id="page-loader-overlay">
    <!-- Space Background Mini Meteors -->
    <div class="mini-meteor mini-1"></div>
    <div class="mini-meteor mini-2"></div>
    <div class="mini-meteor mini-3"></div>

    <!-- Main Meteor Container -->
    <div class="meteor-container">
      <div class="meteor-trail"></div>
      <div class="meteor-head">
        <div class="meteor-crater meteor-crater-1"></div>
        <div class="meteor-crater meteor-crater-2"></div>
        <div class="meteor-crater meteor-crater-3"></div>
        <div class="meteor-crater meteor-crater-4"></div>
      </div>
    </div>

    <!-- Glowing Loading Text -->
    <div style="margin-top: 50px; text-align: center; z-index: 20;">
      <h2 style="
        font-size: 2.2rem;
        font-weight: 900;
        color: #FFFFFF;
        font-family: 'Chiron GoRound TC', sans-serif;
        margin: 0;
        letter-spacing: 1px;
        text-shadow: 0 0 15px rgba(255, 94, 151, 0.9), 0 0 5px rgba(157, 28, 127, 0.5);
      ">Bé <span class="custom-đ">d</span>ợi chút nhé<span class="loading-dots"></span></h2>
    </div>
  </div>

  <!-- Navigation Header Bar Scaler Wrapper (Matches Character page scaler size) -->
  <div class="scaler-wrapper" style="
    position: absolute;
    top: 0;
    left: 50%;
    width: 1927.63px;
    height: 930px;
    transform-origin: top center;
    transform: translateX(-50%) scale(1);
    pointer-events: none;
    z-index: 1000;
  ">
    <header style="
      position: absolute;
      left: 38px;
      top: 35px;
      width: 1735.15px;
      height: 76.48px;
      background: rgba(253, 250, 244, 0.6);
      border-radius: 24px;
      padding: 0 50px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      pointer-events: auto;
    ">
      <div style="display: flex; align-items: center; gap: 15px; cursor: pointer; margin-left: -8px;"
        onclick="window.location.href='/'">
        <img src="assets/images/logo.svg" alt="StoryMee Logo" style="height: 60px; width: auto; object-fit: contain;">
      </div>
    </header>
    <!-- Circular close button with an x, placed inline with the navigation bar inside scaler -->
    <button type="button" onclick="playPopSoundAndNavigate('/login')" aria-label="Đóng" style="
      position: absolute;
      right: 38px;
      top: 35px;
      width: 76.48px;
      height: 76.48px;
      background: linear-gradient(135deg, #ff9eb5, #ff7597);
      border: none;
      color: #FFFFFF;
      font-size: 2.1rem;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 20px rgba(255, 117, 151, 0.35);
      transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 1000;
      pointer-events: auto;
    " onmouseover="this.style.transform='scale(1.1) rotate(90deg)';"
      onmouseout="this.style.transform='scale(1) rotate(0deg)';">
      <i class="fa-solid fa-xmark"></i>
    </button>
  </div>




  <!-- Signup Form centered card wrapper -->
  <div class="signup-scaler-wrapper" style="
    position: absolute;
    top: calc(52% + 40px);
    left: 50%;
    width: 580px;
    height: 700px;
    transform-origin: center center;
    transform: translate(-50%, -50%) scale(1);
    z-index: 100;
    pointer-events: auto;
  ">
    <div style="
      width: 100%;
      height: 100%;
      background-image: linear-gradient(rgba(255, 255, 255, 0.95), rgba(255, 255, 255, 0.95)), linear-gradient(135deg, #ff9f43, #ff7597);
      background-origin: border-box;
      background-clip: padding-box, border-box;
      border: 4px solid transparent;
      border-radius: 36px;
      box-shadow: 0 20px 50px rgba(255, 117, 151, 0.15);
      box-sizing: border-box;
      padding: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: 'Mali', sans-serif;
    ">
      <h2 style="
        font-family: 'Chiron GoRound TC', sans-serif;
        font-size: 2.2rem;
        font-weight: 700;
        color: #ff7597;
        margin-bottom: 25px;
        text-transform: uppercase;
        letter-spacing: 1px;
      ">Đăng Ký</h2>

      <!-- Form -->
      <form onsubmit="handleSignup(event)" style="width: 100%; display: flex; flex-direction: column; gap: 18px;">
        <!-- Tên đăng nhập -->
        <div style="position: relative; width: 100%;">
          <input type="text" id="username" placeholder="Tên đăng nhập" style="
            width: 100%;
            height: 52px;
            background: #FDF9F6 !important;
            border: 2px solid #E5D9CE !important;
            border-radius: 16px !important;
            outline: none !important;
            font-family: 'Mali', sans-serif;
            font-weight: 500;
            font-size: 1.05rem;
            color: #4A3D3C;
            padding: 0 20px;
            box-sizing: border-box;
            transition: border-color 0.2s ease;
          " onfocus="this.style.borderColor='#ff7597'" onblur="this.style.borderColor='#E5D9CE'">
        </div>

        <!-- Email hoặc số điện thoại -->
        <div style="position: relative; width: 100%;">
          <input type="text" id="email_phone" placeholder="Email hoặc Số điện thoại" style="
            width: 100%;
            height: 52px;
            background: #FDF9F6 !important;
            border: 2px solid #E5D9CE !important;
            border-radius: 16px !important;
            outline: none !important;
            font-family: 'Mali', sans-serif;
            font-weight: 500;
            font-size: 1.05rem;
            color: #4A3D3C;
            padding: 0 20px;
            box-sizing: border-box;
            transition: border-color 0.2s ease;
          " onfocus="this.style.borderColor='#ff7597'" onblur="this.style.borderColor='#E5D9CE'">
        </div>

        <!-- Mật khẩu -->
        <div style="position: relative; width: 100%;">
          <input type="password" id="password" placeholder="Mật khẩu" style="
            width: 100%;
            height: 52px;
            background: #FDF9F6 !important;
            border: 2px solid #E5D9CE !important;
            border-radius: 16px !important;
            outline: none !important;
            font-family: 'Mali', sans-serif;
            font-weight: 500;
            font-size: 1.05rem;
            color: #4A3D3C;
            padding: 0 50px 0 20px;
            box-sizing: border-box;
            transition: border-color 0.2s ease;
          " onfocus="this.style.borderColor='#ff7597'" onblur="this.style.borderColor='#E5D9CE'">
          <button type="button" onclick="togglePasswordVisibility('password', 'password-eye-1')" style="
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            color: #C8B5A7;
            font-size: 1.2rem;
            cursor: pointer;
            outline: none;
            display: flex;
            align-items: center;
          ">
            <i class="fa-solid fa-eye" id="password-eye-1"></i>
          </button>
        </div>

        <!-- Xác nhận mật khẩu -->
        <div style="position: relative; width: 100%;">
          <input type="password" id="confirm_password" placeholder="Xác nhận mật khẩu" style="
            width: 100%;
            height: 52px;
            background: #FDF9F6 !important;
            border: 2px solid #E5D9CE !important;
            border-radius: 16px !important;
            outline: none !important;
            font-family: 'Mali', sans-serif;
            font-weight: 500;
            font-size: 1.05rem;
            color: #4A3D3C;
            padding: 0 50px 0 20px;
            box-sizing: border-box;
            transition: border-color 0.2s ease;
          " onfocus="this.style.borderColor='#ff7597'" onblur="this.style.borderColor='#E5D9CE'">
          <button type="button" onclick="togglePasswordVisibility('confirm_password', 'password-eye-2')" style="
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            color: #C8B5A7;
            font-size: 1.2rem;
            cursor: pointer;
            outline: none;
            display: flex;
            align-items: center;
          ">
            <i class="fa-solid fa-eye" id="password-eye-2"></i>
          </button>
        </div>

        <!-- Checkbox Điều khoản -->
        <label style="
          display: flex;
          align-items: flex-start;
          gap: 10px;
          cursor: pointer;
          font-family: 'Mali', sans-serif;
          font-weight: 500;
          font-size: 0.9rem;
          color: #A99586;
          user-select: none;
          margin-top: 5px;
          line-height: 1.4;
        ">
          <input type="checkbox" id="terms-checkbox" style="
            accent-color: #ff7597;
            width: 18px;
            height: 18px;
            cursor: pointer;
            margin-top: 2px;
          ">
          <span>Tôi đồng ý với <a href="#" style="color: #ff7597; font-weight: 600; text-decoration: none;">Điều khoản sử dụng</a> và <a href="#" style="color: #ff7597; font-weight: 600; text-decoration: none;">Chính sách quyền riêng tư</a></span>
        </label>

        <!-- Submit Button -->
        <button type="submit" class="login-btn" style="
          width: 100%;
          height: 52px;
          background: linear-gradient(135deg, #ff7597, #ff9eb5) !important;
          border: none !important;
          border-radius: 16px !important;
          color: #FFFFFF !important;
          font-family: 'Chiron GoRound TC', sans-serif;
          font-weight: 700;
          font-size: 1.2rem;
          text-transform: uppercase;
          cursor: pointer;
          display: flex;
          align-items: center;
          justify-content: center;
          outline: none;
          margin-top: 15px;
          box-shadow: 0 8px 20px rgba(255, 117, 151, 0.3);
          transition: all 0.2s ease;
        " onmouseover="this.style.transform='scale(1.02)'" onmouseout="this.style.transform='scale(1)'">đăng ký</button>

        <!-- Redirect Link -->
        <div style="
          text-align: center;
          margin-top: 15px;
          font-size: 1rem;
          color: #A99586;
        ">
          Đã có tài khoản? <a href="#" onclick="playPopSoundAndNavigate('/login'); return false;" style="color: #ff7597; font-weight: 700; text-decoration: none;"
            onmouseover="this.style.textDecoration='underline';" onmouseout="this.style.textDecoration='none';">Đăng nhập</a>
        </div>
      </form>
    </div>
  </div>
  <script>
    // Play sound and navigate
    function playPopSoundAndNavigate(url) {
      try {
        const audio = new Audio('/assets/audio/pop.mp3');
        audio.volume = 0.5;
        audio.play();
      } catch (e) { }
      const loader = document.getElementById('page-loader-overlay');
      if (loader) {
        loader.style.display = 'flex';
        loader.offsetHeight; // Force reflow
        loader.style.opacity = '1';
      }
      setTimeout(() => {
        window.location.href = url;
      }, 350);
    }

    // Handle form submit
    function handleSignup(event) {
      event.preventDefault();

      const username = document.getElementById('username').value.trim();
      const emailPhone = document.getElementById('email_phone').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirm_password').value;
      const termsChecked = document.getElementById('terms-checkbox').checked;

      if (!username) {
        alert('Vui lòng nhập tên đăng nhập!');
        return;
      }
      if (!emailPhone) {
        alert('Vui lòng nhập Email hoặc Số điện thoại!');
        return;
      }
      if (!password) {
        alert('Vui lòng nhập mật khẩu!');
        return;
      }
      if (password !== confirmPassword) {
        alert('Mật khẩu xác nhận không khớp!');
        return;
      }
      if (!termsChecked) {
        alert('Vui lòng đồng ý với Điều khoản sử dụng và Chính sách quyền riêng tư!');
        return;
      }

      // Prevent double form submission
      document.body.style.pointerEvents = 'none';

      // Navigate to login with pop sound and page loader
      playPopSoundAndNavigate('/login');
    }

    // Toggle password visibility (show/hide)
    function togglePasswordVisibility(inputId, eyeIconId) {
      const passwordInput = document.getElementById(inputId);
      const eyeIcon = document.getElementById(eyeIconId);
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        eyeIcon.className = 'fa-solid fa-eye-slash';
      } else {
        passwordInput.type = 'password';
        eyeIcon.className = 'fa-solid fa-eye';
      }
    }

    function adjustScale() {
      const targetWidth = 1927.63;
      const targetHeight = 930;
      const winWidth = window.innerWidth;
      const winHeight = window.innerHeight;

      const scale = Math.min(winWidth / targetWidth, winHeight / targetHeight);

      // 1. Scale top header wrapper
      const wrapper = document.querySelector('.scaler-wrapper');
      if (wrapper) {
        wrapper.style.transform = `translateX(-50%) scale(${scale})`;
      }

      // 2. Scale signup card wrapper
      const signupWrapper = document.querySelector('.signup-scaler-wrapper');
      if (signupWrapper) {
        signupWrapper.style.transform = `translate(-50%, -50%) scale(${scale})`;
      }
    }

    window.addEventListener('resize', adjustScale);
    adjustScale();

    let loaderFaded = false;
    let pageLoaded = false;

    function hidePageLoader() {
      if (pageLoaded) return;
      pageLoaded = true;

      // Ensure scale is adjusted first
      adjustScale();

      const loader = document.getElementById('page-loader-overlay');
      if (!loader) return;

      // Wait 150ms after window load to ensure everything is positioned/scaled smoothly, then fade out
      setTimeout(() => {
        loader.style.opacity = '0';
        setTimeout(() => {
          loader.style.display = 'none';
        }, 400);
      }, 150);
    }

    window.addEventListener('load', hidePageLoader);
    window.addEventListener('pageshow', (e) => {
      if (e.persisted) {
        pageLoaded = false;
        hidePageLoader();
      }
    });

    // Go back
    function goBack() {
      if (document.referrer) {
        window.history.back();
      } else {
        window.location.href = '/';
      }
    }
  </script>
</body>
