<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lobby Nhân Vật - AIkid</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bowlby+One&family=Fredoka:wght@400;500;600;700&family=Mali:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Chiron+GoRound+TC:wght@900&display=swap" rel="stylesheet">
  
  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Link to the common universe styles -->
  <link rel="stylesheet" href="/mee/styles.css">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-image: url('/assets/images/bg-character-feature.png') !important;
      background-repeat: no-repeat !important;
      background-position: center center !important;
      background-size: cover !important;
      background-attachment: fixed !important;
      background-color: #fad698 !important;
      font-family: 'Mali', sans-serif;
      box-sizing: border-box;
      position: relative;
    }

    .scaler-wrapper {
      position: absolute;
      top: 0;
      left: 50%;
      width: 1927.63px;
      height: 930px;
      transform-origin: top center;
      transform: translateX(-50%) scale(1);
      background: transparent !important;
      overflow: hidden;
      pointer-events: none;
    }

    .scaler-wrapper > * {
      pointer-events: auto;
    }

    /* 2-Column Cards Container */
    .lobby-cards-container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -40%);
      display: flex;
      gap: 50px;
      justify-content: center;
      align-items: center;
      width: 90%;
      max-width: 860px;
      z-index: 10;
      pointer-events: none;
    }

    /* Individual Card with white border and solid #F5EDE6 background */
    .lobby-card-item {
      position: relative;
      flex: 1;
      height: 380px;
      background: #FDFAF4 !important;
      border: 10px solid #FFFFFF;
      border-radius: 48px;
      box-shadow: 0 15px 45px rgba(0, 0, 0, 0.1);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.3s cubic-bezier(0.25, 1, 0.5, 1);
      pointer-events: auto;
      box-sizing: border-box;
    }

    .lobby-card-item:hover {
      transform: translateY(-16px);
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.2);
    }

    .lobby-card-item:active {
      transform: translateY(-8px) scale(0.98);
    }

    /* Content wrapper */
    .lobby-card-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    /* Gradient Pink Icon */
    .lobby-card-icon {
      font-size: 5rem;
      background: linear-gradient(135deg, #FF5E97 0%, #FF9EB5 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: inline-block;
      transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
    }

    /* Interactive Box Container */
    .interactive-box {
      width: 90px;
      height: 90px;
      position: relative;
      margin-bottom: 5px;
    }

    /* Box Lid */
    .box-lid {
      width: 90px;
      height: 22px;
      background: linear-gradient(135deg, #FF5E97 0%, #FF9EB5 100%);
      border-radius: 7px;
      position: absolute;
      top: 12px;
      left: 0;
      z-index: 3;
      transform-origin: bottom right;
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    /* Box Body */
    .box-body {
      width: 80px;
      height: 56px;
      background: linear-gradient(135deg, #FF5E97 0%, #FF9EB5 100%);
      border-radius: 0 0 16px 16px;
      position: absolute;
      top: 32px;
      left: 5px;
      z-index: 2;
      display: flex;
      justify-content: center;
      box-sizing: border-box;
    }

    /* Handle Slot */
    .box-handle {
      width: 32px;
      height: 7px;
      background: #FDFAF4;
      border-radius: 9999px;
      margin-top: 10px;
    }

    /* Hover States triggered by lobby-card-item */
    .lobby-card-item:hover .box-lid {
      transform: translate(-15px, -38px) rotate(-25deg);
    }

    /* Right Card: Magic Wand Sparkle Hover Effect */
    @keyframes wandSparkle {
      0% { transform: scale(1) rotate(0deg); }
      50% { transform: scale(1.15) rotate(15deg); }
      100% { transform: scale(1) rotate(0deg); }
    }
    
    .lobby-card-item:hover .lobby-card-icon {
      animation: wandSparkle 1.2s ease-in-out infinite;
    }

    .lobby-card-title {
      font-family: 'Chiron GoRound TC', sans-serif;
      font-weight: 900;
      font-size: 1.6rem;
      color: #475569;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 5px;
    }

    /* Custom high-fidelity rounded Vietnamese letter đ */
    .custom-đ {
      position: relative;
      display: inline-block;
      font-family: 'Chiron GoRound TC', sans-serif !important;
    }
    .custom-đ::after {
      content: "";
      position: absolute;
      width: 0.46em;
      height: 0.12em;
      background: currentColor;
      border-radius: 9999px;
      top: 0.32em;
      left: 0.27em;
    }

    #page-loader-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: linear-gradient(135deg, #FF6B6B 0%, #FF8E53 55%, #FCE082 100%);
      background-image: 
        radial-gradient(rgba(255,255,255,0.4), rgba(255,255,255,0.1) 2px, transparent 40px),
        radial-gradient(rgba(255,255,255,0.3), rgba(255,255,255,0.05) 1px, transparent 30px),
        linear-gradient(135deg, #FF6B6B 0%, #FF8E53 55%, #FCE082 100%);
      background-size: 550px 550px, 350px 350px, 100% 100%;
      background-position: 0 0, 40px 60px, 0 0;
      z-index: 999999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 1;
      transition: opacity 0.4s ease;
      pointer-events: all;
      overflow: hidden;
    }
    @keyframes meteorFlight {
      0% { transform: translate(60vw, -60vh) rotate(150deg); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translate(-60vw, 60vh) rotate(150deg); opacity: 0; }
    }
    @keyframes miniFlight {
      0% { transform: translate(60vw, -60vh) rotate(150deg); opacity: 0; }
      15% { opacity: 0.6; }
      85% { opacity: 0.6; }
      100% { transform: translate(-60vw, 60vh) rotate(150deg); opacity: 0; }
    }
    @keyframes loadingDots {
      0%, 20% { content: "."; }
      40% { content: ".."; }
      60%, 100% { content: "..."; }
    }
    .loading-dots::after {
      content: "";
      animation: loadingDots 1.5s infinite steps(1);
      display: inline-block;
      width: 24px;
      text-align: left;
    }
    .meteor-container {
      position: relative;
      width: 320px;
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      animation: meteorFlight 2.2s cubic-bezier(0.25, 0.8, 0.25, 1) infinite;
      z-index: 10;
    }
    .meteor-head {
      width: 80px;
      height: 80px;
      background: radial-gradient(circle at 35% 35%, #FFF0F5 0%, #FFB6C1 25%, #FF5E97 60%, #9D1C7F 100%);
      border-radius: 50%;
      box-shadow: 0 0 25px rgba(255, 94, 151, 0.9), 0 0 60px rgba(157, 28, 127, 0.6), 0 0 120px rgba(157, 28, 127, 0.4);
      position: relative;
      flex-shrink: 0;
    }
    .meteor-crater {
      position: absolute;
      background: rgba(0, 0, 0, 0.08);
      border-radius: 50%;
      box-shadow: inset 1px 1px 2px rgba(0,0,0,0.15);
    }
    .meteor-crater-1 { width: 14px; height: 14px; top: 22px; left: 18px; }
    .meteor-crater-2 { width: 20px; height: 20px; top: 32px; left: 32px; }
    .meteor-crater-3 { width: 12px; height: 12px; top: 18px; left: 45px; }
    .meteor-crater-4 { width: 10px; height: 10px; top: 48px; left: 20px; }
    .meteor-trail {
      width: 600px;
      height: 70px;
      background: linear-gradient(to right, rgba(157, 28, 127, 0) 0%, rgba(157, 28, 127, 0.25) 35%, rgba(255, 94, 151, 0.75) 75%, rgba(255, 240, 245, 0.95) 100%);
      border-radius: 40px 0 0 40px;
      margin-right: -40px;
      filter: blur(2px);
    }
    .mini-meteor {
      position: absolute;
      width: 160px;
      height: 5px;
      background: linear-gradient(to right, rgba(255, 182, 193, 0) 0%, rgba(255, 255, 255, 0.9) 100%);
      border-radius: 9999px;
      opacity: 0;
      filter: blur(1.5px);
      transform: rotate(150deg);
    }
    .mini-1 { top: 25%; left: 15%; animation: miniFlight 1.6s linear infinite; animation-delay: 0.4s; }
    .mini-2 { top: 75%; left: 5%; animation: miniFlight 1.9s linear infinite; animation-delay: 0.9s; }
    .mini-3 { top: 85%; left: 50%; animation: miniFlight 1.4s linear infinite; animation-delay: 0.1s; }
  </style>
</head>
<body>

  <!-- Global Meteor Loading Overlay -->
  <div id="page-loader-overlay">
    <!-- Space Background Mini Meteors -->
    <div class="mini-meteor mini-1"></div>
    <div class="mini-meteor mini-2"></div>
    <div class="mini-meteor mini-3"></div>

    <!-- Main Meteor Container -->
    <div class="meteor-container">
      <div class="meteor-trail"></div>
      <div class="meteor-head">
        <div class="meteor-crater meteor-crater-1"></div>
        <div class="meteor-crater meteor-crater-2"></div>
        <div class="meteor-crater meteor-crater-3"></div>
        <div class="meteor-crater meteor-crater-4"></div>
      </div>
    </div>

    <!-- Glowing Loading Text -->
    <div style="margin-top: 50px; text-align: center; z-index: 20;">
      <h2 style="
        font-size: 2.2rem;
        font-weight: 900;
        color: #FFFFFF;
        font-family: 'Chiron GoRound TC', sans-serif;
        margin: 0;
        letter-spacing: 1px;
        text-shadow: 0 0 15px rgba(255, 94, 151, 0.9), 0 0 5px rgba(157, 28, 127, 0.5);
      ">Bé <span class="custom-đ">d</span>ợi chút nhé<span class="loading-dots"></span></h2>
    </div>
  </div>

  <div class="scaler-wrapper">
    <!-- Top Navigation Header from StoryMee Universe -->
    <header class="universe-header">
      <div class="universe-header-left">
        <div class="universe-logo" onclick="playPopAndNavigate('/')">
          <img src="/mee/logo.svg" alt="StoryMee Logo" class="logo-image">
        </div>
      </div>
      <div class="universe-header-right">
        <button class="universe-signup-btn" onclick="playPopAndNavigate('/login')">Đăng Nhập</button>
      </div>
    </header>

    <!-- Floating Back Button -->
    <div class="back-btn-container"
      style="position: absolute; left: 38px; top: 131px; z-index: 1000; transform: scale(1.1); transform-origin: left top;">
      <button onclick="playPopAndNavigate('/')" style="
        background: linear-gradient(135deg, #ff9eb5, #ff7597);
        border: none;
        border-radius: 9999px;
        color: white;
        font-family: 'Mali', sans-serif;
        font-weight: 700;
        font-size: 1rem;
        padding: 10px 25px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        box-shadow: 0 4px 12px rgba(255, 117, 151, 0.3);
        transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      ">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" />
        </svg>
        <span>Trở Về</span>
      </button>
    </div>

    <!-- Center Content: 2-Column Cards -->
    <div class="lobby-cards-container">
      
      <!-- Left Card: Tạo nhân vật -->
      <div class="lobby-card-item" onclick="playPopAndNavigate('/character/generate')">
        <div class="lobby-card-content">
          <i class="fa-solid fa-circle-plus lobby-card-icon"></i>
          <div class="lobby-card-title">Tạo nhân vật</div>
        </div>
      </div>

      <!-- Right Card: Kho nhân vật -->
      <div class="lobby-card-item" onclick="playPopAndNavigate('/character/storage')">
        <div class="lobby-card-content">
          <!-- Interactive Animating Box -->
          <div class="interactive-box">
            <div class="box-lid"></div>
            <div class="box-body">
              <div class="box-handle"></div>
            </div>
          </div>
          <div class="lobby-card-title">Kho nhân vật</div>
        </div>
      </div>

    </div>
  </div>

  <script>
    // Bubble pop sound using Web Audio API
    function playPopSound() {
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(150, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.12);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.12);
      } catch (e) {
        console.warn("Audio Context blocked: ", e);
      }
    }

    function playPopAndNavigate(url) {
      playPopSound();
      if (url === '#') {
        alert("Tính năng Kho nhân vật đang được phát triển bé nhé!");
        return;
      }
      const loader = document.getElementById('page-loader-overlay');
      if (loader) {
        loader.style.display = 'flex';
        loader.offsetHeight;
        loader.style.opacity = '1';
      }
      setTimeout(() => {
        window.location.href = url;
      }, 350);
    }

    function adjustScale() {
      const wrapper = document.querySelector('.scaler-wrapper');
      if (!wrapper) return;
      
      const targetWidth = 1927.63;
      const targetHeight = 930;
      const winWidth = window.innerWidth;
      const winHeight = window.innerHeight;
      
      const scale = Math.min(winWidth / targetWidth, winHeight / targetHeight);
      wrapper.style.transform = `translateX(-50%) scale(${scale})`;
    }

    window.addEventListener('resize', adjustScale);
    adjustScale();

    let pageLoaded = false;
    function hidePageLoader() {
      if (pageLoaded) return;
      pageLoaded = true;
      adjustScale();
      const loader = document.getElementById('page-loader-overlay');
      if (!loader) return;
      setTimeout(() => {
        loader.style.opacity = '0';
        setTimeout(() => {
          loader.style.display = 'none';
        }, 400);
      }, 150);
    }

    window.addEventListener('load', hidePageLoader);
    window.addEventListener('pageshow', (e) => {
      if (e.persisted) {
        pageLoaded = false;
        hidePageLoader();
      }
    });
  </script>
</body>
</html>
