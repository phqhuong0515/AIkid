          transform: translate(60vw, -60vh) rotate(150deg);

        }

        60%, 100% { content: "..."; }
      }

        text-align: left;
      }

  <div class="scaler-wrapper">
    <script>
      // Apply correct transform scale immediately before rendering any DOM nodes to prevent jumps
      (function() {
        // Detect embed (Expo iframe) FIRST — skip scale, use responsive CSS instead
        var isEmbed = false;
        try { isEmbed = window.parent && window.parent !== window; } catch(e) {}
        try { if (!isEmbed) isEmbed = new URLSearchParams(window.location.search).get('embed') === '1'; } catch(e) {}
        if (isEmbed) {
          // Add mee-embed class immediately so CSS !important takes effect before paint
          document.documentElement.classList.add('mee-embed');
          return; // Skip JS scale — CSS handles responsive layout
        }
        const targetWidth = 1927.63;
        const targetHeight = 930;
        const winWidth = window.innerWidth;
        const winHeight = window.innerHeight;
        const scale = Math.min(winWidth / targetWidth, winHeight / targetHeight);
        const wrapper = document.currentScript.parentNode;
        wrapper.style.transform = `translateX(-50%) scale(${scale})`;
      })();
    </script>

  <script>
    function adjustScale() {
      const wrapper = document.querySelector('.scaler-wrapper');
      if (!wrapper) return;
      
      // In embed (Expo iframe), CSS handles responsive layout — skip JS scale
      const embed = document.documentElement.classList.contains('mee-embed')
        || document.body.classList.contains('mee-embed');
      if (embed) {
        wrapper.style.transform = '';  // clear any previously set transform
        wrapper.style.position = '';
        return;
      }

      const targetWidth = 1927.63;
      const targetHeight = 930;
      const winWidth = window.innerWidth;
      const winHeight = window.innerHeight;
      
      const scale = Math.min(winWidth / targetWidth, winHeight / targetHeight);
      
      wrapper.style.transform = `translateX(-50%) scale(${scale})`;
    }
    
    function playPopSound() {
      const audio = document.getElementById('pop-audio');
      if (audio) {
        audio.currentTime = 0;
        audio.play().catch(err => console.log('Audio play blocked:', err));
      }
    }

    /** true when loaded inside AIkidApp Expo iframe (?embed=1) */
    function isExpoEmbed() {
      try {
        return window.parent && window.parent !== window;
      } catch (e) {
        return false;
      }
    }

    function resolveNavUrl(url) {
      // Special tokens for AIkidApp + standalone lobby server
      if (url === '__HOME__' || url === '/' || url === 'http://localhost:8000' || url === 'http://localhost:8000/') {
        if (isExpoEmbed()) return { target: 'parent', href: '/lobby' };
        return { target: 'self', href: '/' };
      }
      if (url === '__LOGIN__' || url === 'http://localhost:8000/login' || /\/login\/?$/.test(url)) {
        if (isExpoEmbed()) return { target: 'parent', href: '/login' };
        return { target: 'self', href: '/login.html' };
      }
      return { target: 'self', href: url };
    }

    function playPopAndNavigate(url) {
      playPopSound();
      const nav = resolveNavUrl(url);
      // Parent SPA: never leave HTML loader stuck
      if (nav.target === 'parent') {
        try {
          window.parent.location.href = nav.href;
          return;
        } catch (e) {
          console.warn('parent navigate failed', e);
        }
      }
      const loader = document.getElementById('page-loader-overlay');
      if (loader) {
        loader.style.display = 'flex';
        loader.offsetHeight;
        loader.style.opacity = '1';
      }
      setTimeout(function () {
        window.location.href = nav.href;
      }, 280);
    }

    // Embed mode: hide universe top bar when inside AIkidApp (auth already done)
    (function applyEmbedMode() {
      try {
        const q = new URLSearchParams(window.location.search);
        if (q.get('embed') === '1' || isExpoEmbed()) {
          document.documentElement.classList.add('mee-embed');
          document.body.classList.add('mee-embed');
        }
      } catch (e) { /* ignore */ }
    })();

    let loaderFaded = false;
    let pageLoaded = false;

    function hidePageLoader() {
      pageLoaded = true;
      const loader = document.getElementById('page-loader-overlay');
      if (!loader || loader.style.display === 'none') {
        adjustScale();
        return;
      }

      adjustScale();

      const meteorContainer = document.querySelector('.meteor-container');
      if (meteorContainer) {
        const iterationHandler = () => {
          if (!loaderFaded) {
            loaderFaded = true;
            performLoaderFadeOut(loader);
            meteorContainer.removeEventListener('animationiteration', iterationHandler);
          }
        };
        meteorContainer.addEventListener('animationiteration', iterationHandler);

        setTimeout(() => {
          if (!loaderFaded) {
            loaderFaded = true;
            performLoaderFadeOut(loader);
            meteorContainer.removeEventListener('animationiteration', iterationHandler);
          }
        }, 2500);
      } else {
        setTimeout(() => {
          performLoaderFadeOut(loader);
        }, 150);
      }
    }

    function performLoaderFadeOut(loader) {
      adjustScale();
      loader.style.opacity = '0';
      setTimeout(() => {
        loader.style.display = 'none';
      }, 400);
    }

    window.addEventListener('resize', adjustScale);
    window.addEventListener('load', () => {
      hidePageLoader();
    });
    window.addEventListener('pageshow', (e) => {
      if (e.persisted) {
        loaderFaded = false;
        pageLoaded = false;
        hidePageLoader();
      }
    });
    adjustScale();

  </script>
  <script src="/aikid-nav-bridge.js"></script>
</body>
